<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 微型緩慢成長版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: rgba(0, 255, 65, 0.7); 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3 id="scoreDisplay">長度: 15.0</h3>
        <p style="font-size: 0.7em;">滑鼠轉向 | 左鍵噴射 (加速消耗變快)</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 參數微調：極致小蛇 ---
    let snake = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angle: 0,
        targetAngle: 0,
        speed: 3,
        baseSpeed: 3,
        boostSpeed: 6,
        size: 6,         // 再次縮小到 6 (超精緻小頭)
        color: '#22ff00',
        boostColor: '#00ffff',
        history: [],      
        bodyLength: 15,  // 初始長度
        isBoosting: false
    };

    let foods = [];
    for(let i=0; i<80; i++) { createFood(); } // 點點變多，但營養變低

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1, // 食物也變得超小
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawGrid();

        let currentSpeed = snake.baseSpeed;
        let currentColor = snake.color;

        // 加速邏輯
        if (snake.isBoosting && snake.bodyLength > 5) {
            currentSpeed = snake.boostSpeed;
            currentColor = snake.boostColor;
            snake.bodyLength -= 0.03; // 加速消耗也稍微調慢
            scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
        }

        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);

        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        snake.angle += diff * 0.15; 

        snake.x += Math.cos(snake.angle) * currentSpeed;
        snake.y += Math.sin(snake.angle) * currentSpeed;

        snake.history.unshift({x: snake.x, y: snake.y});
        if (snake.history.length > 3000) snake.history.pop();

        // 畫食物
        foods.forEach((f, index) => {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();

            let dist = Math.hypot(snake.x - f.x, snake.y - f.y);
            if (dist < snake.size + f.size) {
                // --- 核心修改：成長速度變慢 ---
                // 原本是 1.5 或 2.5，現在改成 0.3，代表要吃 10 顆才會長大一點點
                snake.bodyLength += 0.3; 
                foods.splice(index, 1);
                createFood();
                scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
            }
        });

        // 畫身體
        for (let i = Math.floor(snake.bodyLength); i > 0; i--) {
            let index = i * 4; 
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, snake.size * 0.85, 0, Math.PI * 2);
                ctx.fillStyle = snake.isBoosting ? `rgba(0, 255, 255, ${0.6 - i/snake.bodyLength})` : `rgba(34, 255, 0, ${0.6 - i/snake.bodyLength})`;
                ctx.fill();
            }
        }

        // 畫蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        ctx.beginPath();
        ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = currentColor;
        ctx.fill();

        // 極小眼睛
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(3, -2, 2.5, 0, Math.PI * 2);
        ctx.arc(3, 2, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    function drawGrid() {
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        const step = 60;
        for (let x = 0; x < canvas.width; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }

    gameLoop();
</script>
</body>
</html>
