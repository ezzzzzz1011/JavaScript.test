<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 身體進化版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>🐍 進化：長度系統已啟動</h1>
        <p>蛇現在有了可以跟隨的路徑身體！</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let snake = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        angle: 0,
        targetAngle: 0,
        speed: 4,
        size: 20,
        color: '#00FF41',
        history: [], // 儲存走過的路徑
        bodyLength: 20 // 身體的節數
    };

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function gameLoop() {
        // 清除背景 (不留殘影，讓畫面更乾淨)
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 計算角度
        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);

        // 2. 平滑轉向
        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        snake.angle += diff * 0.1;

        // 3. 更新頭部位置
        snake.x += Math.cos(snake.angle) * snake.speed;
        snake.y += Math.sin(snake.angle) * snake.speed;

        // 4. 紀錄路徑 (每移動一幀就存一個座標)
        snake.history.unshift({x: snake.x, y: snake.y});
        
        // 限制路徑長度 (路徑太長會耗效能)
        if (snake.history.length > 500) snake.history.pop();

        // 5. 畫出身體 (從後往前畫)
        // 每隔幾幀取一個座標點來畫一節身體
        for (let i = 1; i < snake.bodyLength; i++) {
            let index = i * 5; // 身體節點的間隔
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, snake.size - (i * 0.5), 0, Math.PI * 2); // 越後面越細
                ctx.fillStyle = `rgba(0, 255, 65, ${1 - i/snake.bodyLength})`; // 越後面越透明
                ctx.fill();
            }
        }

        // 6. 畫出蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        ctx.beginPath();
        ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = snake.color;
        ctx.fill();
        // 眼睛
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(10, -8, 5, 0, Math.PI * 2);
        ctx.arc(10, 8, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
