<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 復活與碰撞完美版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00FF41; pointer-events: none; z-index: 10; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100;
        }
        button {
            padding: 15px 40px; font-size: 22px; cursor: pointer;
            background: #22ff00; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 0 20px rgba(34,255,0,0.4); transition: 0.2s;
        }
        button:hover { transform: scale(1.1); background: #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5.0</h2>
        <p>控制：滑鼠轉向 | 規則：頭撞身體即死</p>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; font-size: 48px;">💥 撞車陣亡！</h1>
        <button onclick="initGame()">重新復活</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overlay = document.getElementById('overlay');

    const WORLD_SIZE = 1600;
    const SNAKE_SIZE = 8;
    let snakes = [];
    let foods = [];
    let gameActive = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Snake {
        constructor(x, y, color, isPlayer = false) {
            this.x = x; this.y = y;
            this.color = color;
            this.isPlayer = isPlayer;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
            this.bodyLength = 5;
            this.history = [];
            this.alive = true;
            this.speed = 1.3;
            this.turnTimer = 0;
            this.invincible = 120; // 剛出生有 2 秒無敵（防止自撞）

            for(let i=0; i<600; i++) this.history.push({x: this.x, y: this.y});
        }

        update(mouse) {
            if (!this.alive) return;
            if (this.invincible > 0) this.invincible--;

            if (this.isPlayer) {
                let dx = mouse.x - canvas.width / 2;
                let dy = mouse.y - canvas.height / 2;
                this.targetAngle = Math.atan2(dy, dx);
            } else {
                this.turnTimer--;
                if (this.turnTimer <= 0) {
                    this.targetAngle += (Math.random() - 0.5) * 2;
                    this.turnTimer = 30 + Math.random() * 50;
                }
            }

            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.1;

            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;

            // 邊界判定
            if (this.x <= 0 || this.x >= WORLD_SIZE || this.y <= 0 || this.y >= WORLD_SIZE) {
                this.die();
            }

            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 2000) this.history.pop();
        }

        die() {
            this.alive = false;
            if (this.isPlayer) {
                gameActive = false;
                overlay.style.display = 'flex';
            }
        }

        draw() {
            if (!this.alive) return;
            // 畫立體身體
            for (let i = Math.floor(this.bodyLength * 3); i > 0; i--) {
                let index = i * 6; 
                let pos = this.history[index];
                if (pos) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SNAKE_SIZE * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.6;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
            // 畫頭
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.beginPath(); ctx.arc(0, 0, SNAKE_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            // 眼睛
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(4, -3, 3, 0, Math.PI * 2); ctx.arc(4, 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI * 2); ctx.arc(5, 3, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function initGame() {
        overlay.style.display = 'none';
        snakes = [];
        foods = [];
        // 重新初始化玩家
        snakes.push(new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#ff6666', true));
        // 重新初始化敵人
        let colors = ['#00CCFF', '#FFAA00', '#FF00FF', '#00FF88', '#ffffff'];
        for(let i=0; i<6; i++) {
            snakes.push(new Snake(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[i%colors.length]));
        }
        // 初始化食物
        for(let i=0; i<120; i++) createFood();
        gameActive = true;
    }

    function createFood() {
        foods.push({
            x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE,
            size: Math.random() * 2 + 2, color: `hsl(${Math.random()*360}, 100%, 70%)`
        });
    }

    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function gameLoop() {
        if (!gameActive) {
            requestAnimationFrame(gameLoop);
            return;
        }

        let player = snakes.find(s => s.isPlayer);
        if (!player) return;

        let camX = canvas.width / 2 - player.x;
        let camY = canvas.height / 2 - player.y;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camX, camY);

        // 背景
        ctx.fillStyle = '#080808'; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // 更新與碰撞判定
        snakes.forEach(s => {
            if (!s.alive) return;
            s.update(mouse);

            // --- 強化版全域碰撞判定 ---
            snakes.forEach(other => {
                if (!other.alive) return;
                // 如果自己還在無敵時間，不檢查自撞
                if (s === other && s.invincible > 0) return;

                // 檢查 s 的頭是否撞到 other 的身體
                // startIndex: 撞別人的話從頭開始算，撞自己從脖子(30)開始算
                let startIndex = (s === other) ? 40 : 10;
                for (let i = startIndex; i < other.bodyLength * 12; i += 5) {
                    let part = other.history[i];
                    if (part) {
                        let d = Math.hypot(s.x - part.x, s.y - part.y);
                        if (d < SNAKE_SIZE * 1.5) s.die();
                    }
                }
            });

            // 吃食物
            foods.forEach((f, i) => {
                if (Math.hypot(s.x - f.x, s.y - f.y) < SNAKE_SIZE + f.size) {
                    s.bodyLength += 0.2; foods.splice(i, 1); createFood();
                    if(s.isPlayer) scoreDisplay.innerText = `長度: ${s.bodyLength.toFixed(1)}`;
                }
            });

            s.draw();
        });

        // 畫食物
        foods.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fillStyle = f.color; ctx.fill();
        });

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    initGame();
    gameLoop();
</script>
</body>
</html>
