<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 立體肉感版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5</h2>
        <p>3D 立體質感 | 慢速模式</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let snake = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        angle: 0,
        targetAngle: 0,
        baseSpeed: 1.2,
        boostSpeed: 3.5,
        size: 9,          // 稍微加大，增加肉感厚度
        color: '#ff6666', // 經典肉色
        boostColor: '#ff9999',
        history: [],      
        bodyLength: 5,
        isBoosting: false
    };

    // 預填路徑
    for(let i=0; i<1000; i++) { snake.history.push({x: snake.x, y: snake.y}); }

    let foods = [];
    for(let i=0; i<80; i++) createFood();

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        // 背景格線 (增加空間感)
        ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        let currentSpeed = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostSpeed : snake.baseSpeed;
        
        if (snake.isBoosting && snake.bodyLength > 3) {
            snake.bodyLength -= 0.02;
            scoreDisplay.innerText = `長度: ${Math.floor(snake.bodyLength)}`;
        }

        // 轉向
        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);
        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        snake.angle += diff * 0.08; 

        // 更新位置
        snake.x += Math.cos(snake.angle) * currentSpeed;
        snake.y += Math.sin(snake.angle) * currentSpeed;

        snake.history.unshift({x: snake.x, y: snake.y});
        if (snake.history.length > 2000) snake.history.pop();

        // 畫食物
        foods.forEach((f, index) => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fillStyle = f.color; ctx.fill();
            let dist = Math.hypot(snake.x - f.x, snake.y - f.y);
            if (dist < snake.size + f.size) {
                snake.bodyLength += 0.2; foods.splice(index, 1); createFood();
                scoreDisplay.innerText = `長度: ${Math.floor(snake.bodyLength)}`;
            }
        });

        // --- 核心修改：立體肉感身體繪製 ---
        // 1. 先畫一層深色描邊 (增加厚度感)
        for (let i = Math.floor(snake.bodyLength * 3); i > 0; i--) {
            let index = Math.floor(i * (4 / currentSpeed) * 3);
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, snake.size * 0.95, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; // 深色重疊
                ctx.fill();
            }
        }

        // 2. 畫主體與立體陰影
        for (let i = Math.floor(snake.bodyLength * 3); i > 0; i--) {
            let index = Math.floor(i * (4 / currentSpeed) * 3);
            if (snake.history[index]) {
                let pos = snake.history[index];
                let r = snake.size * 0.9;
                
                // 陰影設定 (這是立體感的祕訣)
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowOffsetX = 3; // 陰影偏右下，模擬左上光源
                ctx.shadowOffsetY = 3;

                ctx.beginPath();
                ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
                ctx.fillStyle = snake.isBoosting ? snake.boostColor : snake.color;
                ctx.fill();
                
                // 重設陰影，避免影響後續繪圖
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }
        }

        // 畫蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        
        // 頭部主體 (也要加陰影)
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
        ctx.beginPath(); ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = snake.color; ctx.fill();
        ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; // 重設

        // 經典大眼睛 (完全還原土二)
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI * 2); ctx.arc(5, 4, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI * 2); ctx.arc(6, 4, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
