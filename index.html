<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 復活與邊界版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0a0a0a; font-family: "Microsoft JhengHei", sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        button {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #22ff00; border: none; border-radius: 5px; font-weight: bold;
        }
        button:hover { background: #1fb500; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5</h2>
        <p>別撞到邊界或其他蛇的身體！</p>
    </div>

    <div id="overlay">
        <h1 id="deathMsg">你陣亡了！</h1>
        <button onclick="resetGame()">重新復活</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overlay = document.getElementById('overlay');

    // 地圖大小設定
    const WORLD_SIZE = 2000; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let snake, foods, enemies;

    function resetGame() {
        overlay.style.display = 'none';
        
        // 初始化玩家
        snake = {
            x: WORLD_SIZE / 2,
            y: WORLD_SIZE / 2,
            angle: 0,
            targetAngle: 0,
            baseSpeed: 1.2,
            boostSpeed: 3.5,
            size: 9,
            color: '#ff6666',
            history: [],
            bodyLength: 5,
            isBoosting: false,
            alive: true
        };

        // 初始化食物
        foods = [];
        for(let i=0; i<150; i++) createFood();

        // 初始化一些敵人蛇
        enemies = [];
        const colors = ['#00aaff', '#ffaa00', '#ff00ff', '#ffffff', '#00ffaa'];
        for(let i=0; i<8; i++) {
            enemies.push(createEnemy(colors[i % colors.length]));
        }

        // 填滿初始路徑
        for(let i=0; i<1000; i++) { snake.history.push({x: snake.x, y: snake.y}); }
    }

    function createEnemy(color) {
        let ex = Math.random() * WORLD_SIZE;
        let ey = Math.random() * WORLD_SIZE;
        let enemy = {
            x: ex, y: ey, angle: Math.random() * Math.PI * 2, color: color,
            history: [], bodyLength: 5 + Math.random() * 10, alive: true, turnTimer: 0
        };
        for(let i=0; i<1000; i++) { enemy.history.push({x: ex, y: ey}); }
        return enemy;
    }

    function createFood() {
        foods.push({
            x: Math.random() * WORLD_SIZE,
            y: Math.random() * WORLD_SIZE,
            size: Math.random() * 2 + 2,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        if (!snake.alive) {
            overlay.style.display = 'flex';
        }

        // --- 攝像機邏輯 (Camera) ---
        // 讓玩家永遠在畫面中心，我們要平移畫布
        let camX = canvas.width / 2 - snake.x;
        let camY = canvas.height / 2 - snake.y;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camX, camY);

        // 畫地圖背景與邊界
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE); // 畫出紅色邊界框

        // 更新玩家
        if (snake.alive) {
            let speed = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostSpeed : snake.baseSpeed;
            if (snake.isBoosting && snake.bodyLength > 3) snake.bodyLength -= 0.01;

            let dx = (mouse.x - canvas.width / 2);
            let dy = (mouse.y - canvas.height / 2);
            snake.targetAngle = Math.atan2(dy, dx);
            let diff = snake.targetAngle - snake.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            snake.angle += diff * 0.08;

            snake.x += Math.cos(snake.angle) * speed;
            snake.y += Math.sin(snake.angle) * speed;

            // 檢查邊界碰撞
            if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) {
                snake.alive = false;
            }

            snake.history.unshift({x: snake.x, y: snake.y});
            if (snake.history.length > 2000) snake.history.pop();
        }

        // 更新敵人與碰撞偵測
        enemies.forEach(en => {
            if (!en.alive) return;
            en.turnTimer--;
            if (en.turnTimer <= 0) {
                en.angle += (Math.random() - 0.5) * 1;
                en.turnTimer = Math.random() * 50 + 20;
            }
            en.x += Math.cos(en.angle) * 1.0;
            en.y += Math.sin(en.angle) * 1.0;

            // 敵人邊界反彈
            if (en.x < 0 || en.x > WORLD_SIZE) en.angle = Math.PI - en.angle;
            if (en.y < 0 || en.y > WORLD_SIZE) en.angle = -en.angle;

            en.history.unshift({x: en.x, y: en.y});
            if (en.history.length > 1000) en.history.pop();

            // 碰撞判定：玩家撞敵人身體
            for (let i = 15; i < en.bodyLength * 8; i += 5) {
                let p = en.history[i];
                if (p && Math.hypot(snake.x - p.x, snake.y - p.y) < snake.size * 1.5) {
                    snake.alive = false;
                }
            }
            
            drawSnake(en);
        });

        // 畫食物
        foods.forEach((f, i) => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fillStyle = f.color; ctx.fill();
            if (snake.alive && Math.hypot(snake.x - f.x, snake.y - f.y) < snake.size + f.size) {
                snake.bodyLength += 0.2; foods.splice(i, 1); createFood();
                scoreDisplay.innerText = `長度: ${Math.floor(snake.bodyLength)}`;
            }
        });

        drawSnake(snake);
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    function drawSnake(s) {
        if (!s.alive) return;
        let speed = (s === snake && s.isBoosting) ? 3.5 : 1.2;
        
        // 身體肉感
        for (let i = Math.floor(s.bodyLength * 3); i > 0; i--) {
            let index = Math.floor(i * (4 / speed) * 3);
            let pos = s.history[index];
            if (pos) {
                ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.beginPath(); ctx.arc(pos.x, pos.y, snake.size * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = s.color; ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 頭與大眼睛
        ctx.save();
        ctx.translate(s.x, s.y); ctx.rotate(s.angle);
        ctx.beginPath(); ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = s.color; ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI * 2); ctx.arc(5, 4, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI * 2); ctx.arc(6, 4, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    resetGame();
    gameLoop();
</script>
</body>
</html>
