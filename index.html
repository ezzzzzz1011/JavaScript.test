<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗棋 Online v1.7</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; font-family: sans-serif; height: 100vh; justify-content: center; color: white; }
        #lobby { background: #333; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #3498db; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #666; }
        .status-bar { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        canvas { background-color: #dcb35c; box-shadow: 0 0 25px rgba(0,0,0,0.6); cursor: pointer; border: 4px solid #5d4037; border-radius: 8px; display: none; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #444; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #222; color: #fff; text-align: center; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3498db; border: none; color: white; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 5px; font-size: 16px; }
        .id-box { background: #000; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #3498db; cursor: pointer; }
        .id-text { color: #3498db; font-size: 14px; font-weight: bold; word-break: break-all; }
        #net-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4757; margin-right: 10px; }
        /* 勝利閃爍效果 */
        .win-text { color: #2ecc71 !important; font-size: 24px !important; animation: blink 1s infinite; }
        .lose-text { color: #e74c3c !important; font-size: 24px !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="lobby">
    <h2 style="margin:0 0 10px 0;">♟️ 暗棋對戰室</h2>
    <div id="main-ui">
        <div class="status-bar"><div id="net-dot"></div><span id="lobby-msg">伺服器連線中...</span></div>
        <div id="host-area">
            <p style="font-size: 12px; color:#bbb; margin:0;">你的 ID (點擊複製)：</p>
            <div class="id-box" onclick="copyMyId()"><span id="my-id-display" class="id-text">取得中...</span></div>
        </div>
        <div id="join-area">
            <input type="text" id="input-id" placeholder="貼上對手的 ID">
            <button onclick="joinRoom()" style="background:#27ae60;">加入對手房間</button>
        </div>
    </div>
    <div class="version-tag">v1.7</div>
</div>

<div id="game-ui" style="display: none; text-align: center;">
    <div class="status-bar">
        <div id="game-dot" style="width:12px; height:12px; border-radius:50%; background:lime; margin-right:10px;"></div>
        <span id="statusText">連線成功</span>
    </div>
    <div id="turnDisplay" style="margin-bottom: 10px; font-size:14px; color:#aaa;">身分：未定</div>
    <canvas id="chessBoard"></canvas>
    <br>
    <button id="exitBtn" onclick="confirmExit()" style="width:auto; background:#555; margin-top:20px; padding:8px 20px;">回到大廳</button>
</div>

<script>
    const canvas = document.getElementById('chessBoard');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const turnDisplay = document.getElementById('turnDisplay');
    const myIdDisplay = document.getElementById('my-id-display');

    const COLS = 4, ROWS = 8, PADDING = 15;
    let cellSize, board = [], selected = null, myColor = 0, turn = 1, peer, conn, isHost = false, gameEnded = false;

    peer = new Peer();
    peer.on('open', (id) => {
        document.getElementById('net-dot').style.background = "#2ecc71";
        document.getElementById('lobby-msg').innerText = "伺服器就緒";
        myIdDisplay.innerText = id;
    });

    peer.on('connection', (c) => {
        conn = c; isHost = true;
        initBoard(); 
        bindEvents();
    });

    function copyMyId() {
        const id = myIdDisplay.innerText;
        if(id.includes('取得中')) return;
        navigator.clipboard.writeText(id);
        alert("ID 已複製！");
    }

    function joinRoom() {
        const tid = document.getElementById('input-id').value.trim();
        if(!tid) return;
        isHost = false;
        conn = peer.connect(tid);
        bindEvents();
    }

    function confirmExit() {
        if(gameEnded || confirm("確定要退出嗎？這將會判定你輸棋。")) {
            location.reload();
        }
    }

    function bindEvents() {
        conn.on('open', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            resize();
            if(!isHost) sendData({ type: 'GREET' });
        });

        conn.on('data', (data) => {
            if(data.type === 'GREET' && isHost) {
                sendData({ type: 'SYNC', board: board, turn: turn });
            } else if(data.type === 'SYNC') {
                board = data.board;
                turn = data.turn;
                draw(); updateUI();
            } else if(data.type === 'ACTION') {
                const { r1, c1, r2, c2, flip, colorSet } = data;
                if (colorSet) myColor = (colorSet === 1) ? 2 : 1;
                if (flip) { board[r2][c2].revealed = true; }
                else { board[r2][c2] = board[r1][c1]; board[r1][c1] = null; }
                turn = (turn === 1) ? 2 : 1;
                updateUI(); draw(); checkWin();
            }
        });

        conn.on('close', () => {
            if(!gameEnded) {
                gameEnded = true;
                statusText.innerText = "🏆 對方逃跑，你贏了！";
                statusText.classList.add('win-text');
                document.getElementById('game-dot').style.background = "gold";
                alert("對方已退出遊戲！");
            }
        });
    }

    function sendData(d) { if(conn && conn.open) conn.send(d); }
    function resize() {
        const sw = Math.min(window.innerWidth * 0.9, 320);
        canvas.style.display = "block";
        canvas.width = sw; canvas.height = sw*2;
        cellSize = (sw-PADDING*2)/COLS;
        draw();
    }

    function initBoard() {
        const pConf = [
            {n:'帥',l:7,c:1},{n:'仕',l:6,c:1,t:2},{n:'相',l:5,c:1,t:2},{n:'車',l:4,c:1,t:2},{n:'傌',l:3,c:1,t:2},{n:'炮',l:2,c:1,t:2},{n:'兵',l:1,c:1,t:5},
            {n:'將',l:7,c:2},{n:'士',l:6,c:2,t:2},{n:'象',l:5,c:2,t:2},{n:'車',l:4,c:2,t:2},{n:'馬',l:3,c:2,t:2},{n:'包',l:2,c:2,t:2},{n:'卒',l:1,c:2,t:5}
        ];
        let pool = [];
        pConf.forEach(p => { for(let i=0; i<(p.t||1); i++) pool.push({name:p.n, level:p.l, color:p.c, revealed:false}); });
        pool.sort(() => Math.random() - 0.5);
        board = [];
        for(let r=0; r<ROWS; r++) { board[r] = []; for(let c=0; c<COLS; c++) board[r][c] = pool.shift(); }
    }

    canvas.addEventListener('mousedown', e => {
        if(gameEnded) return; // 遊戲結束不能動
        if(myColor !== 0 && turn !== myColor) return;
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((e.clientX-rect.left-PADDING)/cellSize), r = Math.floor((e.clientY-rect.top-PADDING)/cellSize);
        if(r<0||r>=ROWS||c<0||c>=COLS) return;
        const clicked = board[r][c];

        if(clicked && !clicked.revealed) {
            let cs = 0;
            clicked.revealed = true;
            if(myColor === 0) { myColor = clicked.color; cs = myColor; }
            const act = { type: 'ACTION', r2:r, c2:c, flip:true, colorSet:cs };
            sendData(act);
            turn = (turn === 1) ? 2 : 1;
            updateUI(); draw(); checkWin();
            return;
        }

        if(selected) {
            if(canMove(selected.r, selected.c, r, c)) {
                const act = { type: 'ACTION', r1:selected.r, c1:selected.c, r2:r, c2:c, flip:false };
                sendData(act);
                board[r][c] = board[selected.r][selected.c];
                board[selected.r][selected.c] = null;
                selected = null;
                turn = (turn === 1) ? 2 : 1;
                updateUI(); draw(); checkWin();
            } else {
                selected = (clicked && clicked.revealed && clicked.color === myColor) ? {r,c} : null;
                draw();
            }
        } else if(clicked && clicked.revealed && clicked.color === myColor) {
            selected = {r,c};
            draw();
        }
    });

    function canMove(r1,c1,r2,c2) {
        const p1 = board[r1][c1], p2 = board[r2][c2], dist = Math.abs(r1-r2)+Math.abs(c1-c2);
        if(!p1) return false;
        if(p1.name==='炮'||p1.name==='包') {
            if(p2) {
                if(r1!==r2 && c1!==c2) return false;
                let cnt = 0;
                if(r1===r2) for(let i=Math.min(c1,c2)+1; i<Math.max(c1,c2); i++) if(board[r1][i]) cnt++;
                else for(let i=Math.min(r1,r2)+1; i<Math.max(r1,r2); i++) if(board[i][c1]) cnt++;
                return cnt===1 && p1.color!==p2.color && p2.revealed;
            }
        }
        if(dist!==1) return false;
        if(!p2) return true;
        if(p1.color===p2.color || !p2.revealed) return false;
        if(p1.level===1 && p2.level===7) return true;
        if(p1.level===7 && p2.level===1) return false;
        return p1.level>=p2.level;
    }

    function updateUI() {
        if(gameEnded) return;
        const isMyTurn = (myColor === 0 || turn === myColor);
        statusText.innerText = isMyTurn ? "你的回合" : "對手回合";
        turnDisplay.innerText = "身分：" + (myColor === 0 ? "未定" : (myColor === 1 ? "紅方" : "黑方"));
    }

    function draw() {
        if(!board.length) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#5d4037";
        for(let r=0; r<=ROWS; r++) { ctx.beginPath(); ctx.moveTo(PADDING, PADDING+r*cellSize); ctx.lineTo(canvas.width-PADDING, PADDING+r*cellSize); ctx.stroke(); }
        for(let c=0; c<=COLS; c++) { ctx.beginPath(); ctx.moveTo(PADDING+c*cellSize, PADDING); ctx.lineTo(PADDING+c*cellSize, canvas.height-PADDING); ctx.stroke(); }
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                const p = board[r][c]; if(!p) continue;
                const x = PADDING+c*cellSize+cellSize/2, y = PADDING+r*cellSize+cellSize/2;
                if(selected && selected.r === r && selected.c === c) { ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.fillRect(PADDING+c*cellSize, PADDING+r*cellSize, cellSize, cellSize); }
                ctx.beginPath(); ctx.arc(x,y,cellSize*0.42,0,Math.PI*2);
                ctx.fillStyle = p.revealed ? "#fdf5e6" : "#a0522d";
                ctx.fill(); ctx.stroke();
                if(p.revealed) {
                    ctx.fillStyle = p.color===1 ? "#b22222" : "#2f4f4f";
                    ctx.font = `bold ${cellSize*0.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
                    ctx.fillText(p.name, x, y);
                }
            }
        }
    }

    function checkWin() {
        let r=0, b=0;
        board.forEach(row => row.forEach(p => { if(p){ if(p.color===1) r++; else b++; }}));
        
        if(r === 0 || b === 0) {
            gameEnded = true;
            let iWon = (myColor === 1 && r > 0) || (myColor === 2 && b > 0);
            
            if(iWon) {
                statusText.innerText = "🏆 恭喜！你獲勝了！";
                statusText.classList.add('win-text');
            } else {
                statusText.innerText = "💀 遺憾！你輸了。";
                statusText.classList.add('lose-text');
            }
            
            document.getElementById('exitBtn').innerText = "再玩一局";
            document.getElementById('exitBtn').style.background = "#e67e22";
            
            alert(iWon ? "你贏了！" : "你輸了！");
            return true;
        }
        return false;
    }
</script>
</body>
</html>
