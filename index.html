<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗域征途 — 3D RPG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=MedievalSharp&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#0a0a0f;font-family:'Noto Sans TC',sans-serif;color:#e0d6c2;cursor:default;user-select:none;}
canvas{display:block;}

/* ── Shared UI layer ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s;}
.screen.hidden{opacity:0;pointer-events:none;}
.title-text{font-family:'MedievalSharp',cursive;font-size:clamp(2.5rem,6vw,5rem);color:#f4e8c1;text-shadow:0 0 40px rgba(255,180,60,.4),0 4px 12px rgba(0,0,0,.8);letter-spacing:.05em;margin-bottom:.3em;}
.subtitle{font-size:1rem;color:#8a7e6b;margin-bottom:2.5em;letter-spacing:.15em;}

/* ── Character Select ── */
#selectScreen{background:radial-gradient(ellipse at 50% 40%,#1a1520 0%,#0a0a0f 70%);}
.class-cards{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center;perspective:800px;}
.class-card{width:220px;padding:1.8rem 1.4rem;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:16px;text-align:center;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.class-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--accent),.05),transparent);opacity:0;transition:opacity .35s;}
.class-card:hover{transform:translateY(-8px) scale(1.03);border-color:var(--accent);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 30px color-mix(in srgb,var(--accent) 25%,transparent);}
.class-card:hover::before{opacity:1;}
.class-card .icon{font-size:3.5rem;margin-bottom:.6rem;filter:drop-shadow(0 0 12px var(--accent));}
.class-card h3{font-size:1.2rem;margin-bottom:.4rem;color:#f4e8c1;}
.class-card p{font-size:.78rem;color:#8a7e6b;line-height:1.5;margin-bottom:.8rem;}
.class-card .stats{font-size:.7rem;color:#6b6358;line-height:1.7;}
.card-warrior{--accent:#e84040;}
.card-mage{--accent:#5b7fff;}
.card-archer{--accent:#3cc43c;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;padding:14px 20px;display:flex;align-items:center;gap:16px;z-index:20;pointer-events:none;opacity:0;transition:opacity .4s;}
#hud.show{opacity:1;}
.hud-bar-wrap{flex:1;max-width:260px;height:18px;background:rgba(0,0,0,.6);border-radius:9px;border:1px solid rgba(255,255,255,.1);overflow:hidden;position:relative;}
.hud-bar{height:100%;border-radius:9px;transition:width .3s;}
.bar-hp{background:linear-gradient(90deg,#c0392b,#e74c3c);}
.bar-xp{background:linear-gradient(90deg,#8e44ad,#a855f7);}
.hud-bar-wrap .bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.8);}
#hudLevel{font-family:'MedievalSharp',cursive;font-size:1.4rem;color:#f4e8c1;text-shadow:0 0 10px rgba(255,180,60,.5);min-width:70px;text-align:center;}
#hudKills{font-size:.75rem;color:#8a7e6b;min-width:80px;text-align:right;}
#hudWave{font-size:.75rem;color:#b8860b;min-width:80px;text-align:center;}

/* ── Level Up Modal ── */
#levelUpModal{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;opacity:0;pointer-events:none;transition:opacity .4s;}
#levelUpModal.show{opacity:1;pointer-events:auto;}
#levelUpModal h2{font-family:'MedievalSharp',cursive;font-size:2.2rem;color:#f4e8c1;text-shadow:0 0 30px rgba(255,180,60,.5);margin-bottom:.3em;}
#levelUpModal .lv-sub{color:#8a7e6b;margin-bottom:2rem;font-size:.9rem;}
.upgrade-cards{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;}
.upgrade-card{width:200px;padding:1.6rem 1.2rem;background:linear-gradient(170deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.1);border-radius:14px;text-align:center;cursor:pointer;transition:all .3s;}
.upgrade-card:hover{transform:translateY(-6px);border-color:#f4e8c1;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.upgrade-card .up-icon{font-size:2.4rem;margin-bottom:.5rem;}
.upgrade-card h4{font-size:1rem;color:#f4e8c1;margin-bottom:.4rem;}
.upgrade-card p{font-size:.72rem;color:#8a7e6b;line-height:1.5;}

/* ── Game Over ── */
#gameOverScreen{background:rgba(5,5,10,.9);backdrop-filter:blur(6px);}
#gameOverScreen .title-text{color:#e84040;}
.go-stats{margin:1.5rem 0 2rem;font-size:.9rem;color:#8a7e6b;line-height:2;}
.btn-restart{padding:.8rem 2.5rem;font-family:'Noto Sans TC',sans-serif;font-size:1rem;font-weight:700;color:#f4e8c1;background:linear-gradient(135deg,#8e44ad,#c0392b);border:none;border-radius:10px;cursor:pointer;transition:all .3s;}
.btn-restart:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(200,60,60,.4);}

/* ── Wave Banner ── */
#waveBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'MedievalSharp',cursive;font-size:2.5rem;color:#f4e8c1;text-shadow:0 0 30px rgba(255,180,60,.6);z-index:25;opacity:0;pointer-events:none;transition:opacity .6s;}

/* ── Damage Numbers ── */
.dmg-num{position:fixed;pointer-events:none;font-weight:900;font-size:1rem;z-index:22;animation:dmgFloat 1s ease-out forwards;}
.dmg-num.crit{font-size:1.4rem;color:#ff4444 !important;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(.7);}}

/* ── Controls hint ── */
#controlsHint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:.7rem;color:rgba(255,255,255,.25);z-index:20;pointer-events:none;opacity:0;transition:opacity .4s;}
#controlsHint.show{opacity:1;}
</style>
</head>
<body>

<!-- Character Select -->
<div id="selectScreen" class="screen">
  <div class="title-text">暗域征途</div>
  <div class="subtitle">選擇你的英雄</div>
  <div class="class-cards">
    <div class="class-card card-warrior" onclick="startGame('warrior')">
      <div class="icon">⚔️</div>
      <h3>近戰戰士</h3>
      <p>揮舞巨劍，在怪物群中橫衝直撞的鋼鐵猛獸</p>
      <div class="stats">攻擊力 ★★★★☆<br>血量 ★★★★★<br>速度 ★★★☆☆</div>
    </div>
    <div class="class-card card-mage" onclick="startGame('mage')">
      <div class="icon">🔮</div>
      <h3>法師</h3>
      <p>操控元素之力，以火球轟炸一切敢於靠近的敵人</p>
      <div class="stats">攻擊力 ★★★★★<br>血量 ★★☆☆☆<br>速度 ★★★☆☆</div>
    </div>
    <div class="class-card card-archer" onclick="startGame('archer')">
      <div class="icon">🏹</div>
      <h3>射手</h3>
      <p>百步穿楊的神射手，在遠處精準收割每一條性命</p>
      <div class="stats">攻擊力 ★★★☆☆<br>血量 ★★★☆☆<br>速度 ★★★★★</div>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hudLevel">Lv.1</div>
  <div class="hud-bar-wrap"><div class="hud-bar bar-hp" id="hpBar" style="width:100%"></div><div class="bar-label" id="hpLabel">100/100</div></div>
  <div class="hud-bar-wrap"><div class="hud-bar bar-xp" id="xpBar" style="width:0%"></div><div class="bar-label" id="xpLabel">0/20</div></div>
  <div id="hudWave">波次 1</div>
  <div id="hudKills">擊殺 0</div>
</div>

<!-- Level Up -->
<div id="levelUpModal">
  <h2>⚡ 升級！</h2>
  <div class="lv-sub" id="lvSubText">選擇一項強化</div>
  <div class="upgrade-cards" id="upgradeCards"></div>
</div>

<!-- Game Over -->
<div id="gameOverScreen" class="screen hidden">
  <div class="title-text">你倒下了</div>
  <div class="go-stats" id="goStats"></div>
  <button class="btn-restart" onclick="location.reload()">再戰一次</button>
</div>

<!-- Wave Banner -->
<div id="waveBanner"></div>

<!-- Controls Hint -->
<div id="controlsHint">WASD 移動 ｜ 滑鼠左鍵 攻擊 ｜ 消滅怪物升級獲取技能</div>

<script>
// ══════════════════════════════════════
// GAME CONSTANTS & STATE
// ══════════════════════════════════════
const CLASS_DATA = {
  warrior: {
    name: '近戰戰士', hp: 150, atk: 25, atkSpeed: 0.8, speed: 3.5, range: 2.5,
    color: 0xe84040, bodyColor: 0xc0392b, atkType: 'melee'
  },
  mage: {
    name: '法師', hp: 80, atk: 35, atkSpeed: 1.2, speed: 3.5, range: 12,
    color: 0x5b7fff, bodyColor: 0x3a5fcc, atkType: 'projectile'
  },
  archer: {
    name: '射手', hp: 100, atk: 18, atkSpeed: 0.5, speed: 4.5, range: 14,
    color: 0x3cc43c, bodyColor: 0x2a8a2a, atkType: 'projectile'
  }
};

const UPGRADE_POOL = [
  { id:'atk', icon:'⚔️', name:'攻擊強化', desc:'攻擊力 +15%', apply: p => p.atk *= 1.15 },
  { id:'atkSpd', icon:'⚡', name:'疾風連斬', desc:'攻擊速度 +20%', apply: p => p.atkSpeed *= 0.8 },
  { id:'hp', icon:'❤️', name:'生命強化', desc:'最大血量 +25%', apply: p => { p.maxHp *= 1.25; p.hp = p.maxHp; }},
  { id:'spd', icon:'💨', name:'迅捷之風', desc:'移動速度 +15%', apply: p => p.speed *= 1.15 },
  { id:'area', icon:'💥', name:'範圍爆破', desc:'攻擊範圍 +30%', apply: p => p.areaScale *= 1.3 },
  { id:'life', icon:'🩸', name:'生命汲取', desc:'攻擊回復 8% 傷害', apply: p => p.lifesteal += 0.08 },
  { id:'crit', icon:'🎯', name:'致命一擊', desc:'暴擊率 +12%', apply: p => p.critChance += 0.12 },
  { id:'critDmg', icon:'💀', name:'暴擊傷害', desc:'暴擊傷害 +40%', apply: p => p.critDmg += 0.4 },
  { id:'regen', icon:'🌿', name:'自然回復', desc:'每秒回復 2 點生命', apply: p => p.regen += 2 },
  { id:'armor', icon:'🛡️', name:'鋼鐵之膚', desc:'受到傷害 -12%', apply: p => p.damageReduction += 0.12 },
  { id:'thorns', icon:'🌹', name:'荊棘反甲', desc:'反彈 20% 傷害', apply: p => p.thorns += 0.20 },
  { id:'xpBoost', icon:'📖', name:'博學多聞', desc:'經驗獲取 +25%', apply: p => p.xpMult *= 1.25 },
];
const CLASS_UPGRADES = {
  warrior: [
    { id:'cleave', icon:'🌀', name:'旋風斬', desc:'攻擊範圍大幅增加 +50%', apply: p => p.areaScale *= 1.5 },
    { id:'rage', icon:'🔥', name:'狂戰之怒', desc:'血量越低攻擊越高(最多+80%)', apply: p => p.hasRage = true },
  ],
  mage: [
    { id:'bigSpell', icon:'☄️', name:'隕石強化', desc:'火球體積與傷害 +40%', apply: p => { p.areaScale *= 1.4; p.atk *= 1.15; }},
    { id:'chain', icon:'⛓️', name:'連鎖閃電', desc:'攻擊額外彈射 1 個目標', apply: p => p.chainCount += 1 },
  ],
  archer: [
    { id:'multi', icon:'🎆', name:'多重射擊', desc:'額外發射 1 支箭矢', apply: p => p.multiShot += 1 },
    { id:'pierce', icon:'🔱', name:'穿透之矢', desc:'箭矢穿透所有敵人', apply: p => p.pierce = true },
  ]
};

let scene, camera, renderer, clock;
let player = null;
let monsters = [];
let projectiles = [];
let particles = [];
let keys = {};
let mousePos = new THREE.Vector2();
let gameState = 'select'; // select | playing | levelup | gameover
let wave = 1;
let killCount = 0;
let monstersToSpawn = 0;
let spawnTimer = 0;
let waveCleared = true;
let groundMesh;
let ambLight, dirLight, ptLight, gridHelper;
let envObjects = []; // track environment meshes for cleanup
let currentBiome = 'forest';
const BIOMES = {
  forest: {
    name: '幽暗森林', bg: 0x0a120a, fog: 0x0a120a, fogNear: 25, fogFar: 60,
    ground: 0x1a2a15, grid1: 0x1a3318, grid2: 0x0f1f0e,
    amb: 0x224422, ambI: 0.55, dir: 0xccddaa, dirI: 0.7, pt: 0x44aa22, ptI: 0.25,
    pillarColor: 0x3b2510, pillarEmissive: 0x110800
  },
  cave: {
    name: '深淵洞窟', bg: 0x08080e, fog: 0x08080e, fogNear: 20, fogFar: 50,
    ground: 0x15151e, grid1: 0x1e1e2e, grid2: 0x10101a,
    amb: 0x223344, ambI: 0.4, dir: 0x8899bb, dirI: 0.5, pt: 0x4466cc, ptI: 0.4,
    pillarColor: 0x2a2a35, pillarEmissive: 0x111122
  },
  volcano: {
    name: '熔岩火山', bg: 0x1a0800, fog: 0x1a0800, fogNear: 22, fogFar: 55,
    ground: 0x1a1210, grid1: 0x332211, grid2: 0x1a0e08,
    amb: 0x442211, ambI: 0.5, dir: 0xffaa66, dirI: 0.8, pt: 0xff4400, ptI: 0.5,
    pillarColor: 0x2a1a10, pillarEmissive: 0x331100
  },
  underwater: {
    name: '深海遺跡', bg: 0x040a18, fog: 0x040a18, fogNear: 18, fogFar: 48,
    ground: 0x0e1a28, grid1: 0x142233, grid2: 0x0a1520,
    amb: 0x224466, ambI: 0.5, dir: 0x66aadd, dirI: 0.5, pt: 0x22ccff, ptI: 0.35,
    pillarColor: 0x1a2a35, pillarEmissive: 0x0a1520
  }
};
const BIOME_ORDER = ['forest', 'cave', 'volcano', 'underwater'];

// ══════════════════════════════════════
// THREE.JS SETUP
// ══════════════════════════════════════
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);
  scene.fog = new THREE.Fog(0x0a0a0f, 30, 65);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 22, 16);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.prepend(renderer.domElement);

  // Lights
  ambLight = new THREE.AmbientLight(0x334455, 0.6);
  scene.add(ambLight);
  dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -25; dirLight.shadow.camera.right = 25;
  dirLight.shadow.camera.top = 25; dirLight.shadow.camera.bottom = -25;
  scene.add(dirLight);
  ptLight = new THREE.PointLight(0xff6600, 0.3, 30);
  ptLight.position.set(0, 5, 0);
  scene.add(ptLight);

  // Ground
  const groundGeo = new THREE.PlaneGeometry(60, 60, 30, 30);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, roughness: 0.9 });
  groundMesh = new THREE.Mesh(groundGeo, groundMat);
  groundMesh.rotation.x = -Math.PI / 2;
  groundMesh.receiveShadow = true;
  scene.add(groundMesh);

  // Grid lines
  gridHelper = new THREE.GridHelper(60, 30, 0x222233, 0x181825);
  scene.add(gridHelper);

  // Arena boundary markers (will be rebuilt per biome)
  // Initial environment built by switchBiome() after init

  clock = new THREE.Clock();
  window.addEventListener('resize', onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ══════════════════════════════════════
// BIOME / ENVIRONMENT SYSTEM
// ══════════════════════════════════════
function switchBiome(biomeKey) {
  currentBiome = biomeKey;
  const b = BIOMES[biomeKey];

  // Clear old environment objects
  envObjects.forEach(obj => scene.remove(obj));
  envObjects = [];

  // Scene colors
  scene.background.set(b.bg);
  scene.fog = new THREE.Fog(b.fog, b.fogNear, b.fogFar);

  // Lights
  ambLight.color.set(b.amb); ambLight.intensity = b.ambI;
  dirLight.color.set(b.dir); dirLight.intensity = b.dirI;
  ptLight.color.set(b.pt); ptLight.intensity = b.ptI;

  // Ground
  groundMesh.material.color.set(b.ground);

  // Grid
  scene.remove(gridHelper);
  gridHelper = new THREE.GridHelper(60, 30, b.grid1, b.grid2);
  scene.add(gridHelper);

  // Boundary pillars
  for (let i = 0; i < 40; i++) {
    const angle = (i / 40) * Math.PI * 2;
    const r = 27;
    const pillar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.18, 1.5 + Math.random() * 1.5, 6),
      new THREE.MeshStandardMaterial({ color: b.pillarColor, emissive: b.pillarEmissive, emissiveIntensity: 0.3 })
    );
    pillar.position.set(Math.cos(angle) * r, 0.75, Math.sin(angle) * r);
    pillar.castShadow = true;
    scene.add(pillar);
    envObjects.push(pillar);
  }

  // Build biome-specific decorations
  if (biomeKey === 'forest') buildForest();
  else if (biomeKey === 'cave') buildCave();
  else if (biomeKey === 'volcano') buildVolcano();
  else if (biomeKey === 'underwater') buildUnderwater();
}

function addEnv(mesh) { scene.add(mesh); envObjects.push(mesh); }

function buildForest() {
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3b2510, roughness: 0.85 });
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x1a5c1a, roughness: 0.7 });
  const leafDark = new THREE.MeshStandardMaterial({ color: 0x0e3a0e, roughness: 0.7 });
  const mossMat = new THREE.MeshStandardMaterial({ color: 0x2a5a20, roughness: 0.9 });

  // Trees scattered around the arena edges
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 14 + Math.random() * 14;
    const tree = new THREE.Group();
    const h = 2 + Math.random() * 3;
    // Trunk
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, h, 6), trunkMat);
    trunk.position.y = h / 2; trunk.castShadow = true; tree.add(trunk);
    // Canopy layers
    const layers = 2 + Math.floor(Math.random() * 2);
    for (let l = 0; l < layers; l++) {
      const r = (1.2 - l * 0.25) * (0.7 + Math.random() * 0.5);
      const canopy = new THREE.Mesh(
        new THREE.ConeGeometry(r, 1.5, 7),
        Math.random() > 0.5 ? leafMat : leafDark
      );
      canopy.position.y = h * 0.6 + l * 0.9;
      canopy.castShadow = true;
      tree.add(canopy);
    }
    tree.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(tree);
  }

  // Mushrooms
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 20;
    const mush = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.3, 5),
      new THREE.MeshStandardMaterial({ color: 0xddccaa }));
    stem.position.y = 0.15; mush.add(stem);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 4, 0, Math.PI * 2, 0, Math.PI * 0.5),
      new THREE.MeshStandardMaterial({ color: 0xcc2222, emissive: 0x440000, emissiveIntensity: 0.2 }));
    cap.position.y = 0.3; mush.add(cap);
    mush.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(mush);
  }

  // Rocks
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 6 + Math.random() * 18;
    const s = 0.3 + Math.random() * 0.6;
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(s, 0),
      mossMat
    );
    rock.position.set(Math.cos(angle) * dist, s * 0.4, Math.sin(angle) * dist);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.castShadow = true;
    addEnv(rock);
  }

  // Grass tufts
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 3 + Math.random() * 22;
    const grass = new THREE.Mesh(
      new THREE.ConeGeometry(0.08, 0.35 + Math.random() * 0.2, 4),

function buildCave() {
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35, roughness: 0.85 });
  const stoneDark = new THREE.MeshStandardMaterial({ color: 0x1a1a25, roughness: 0.9 });
  const crystalMat = new THREE.MeshStandardMaterial({ color: 0x4466ff, emissive: 0x2244cc, emissiveIntensity: 0.7, transparent: true, opacity: 0.85 });
  const crystalPurple = new THREE.MeshStandardMaterial({ color: 0x8844cc, emissive: 0x6622aa, emissiveIntensity: 0.6, transparent: true, opacity: 0.85 });

  // Stalactites (hanging from above) — cones pointing down
  for (let i = 0; i < 35; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 22;
    const h = 1 + Math.random() * 2.5;
    const stal = new THREE.Mesh(
      new THREE.ConeGeometry(0.15 + Math.random() * 0.2, h, 5),
      stoneMat
    );
    stal.rotation.x = Math.PI;
    stal.position.set(Math.cos(angle) * dist, 6 + Math.random() * 3, Math.sin(angle) * dist);
    addEnv(stal);
  }

  // Stalagmites (from ground up)
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 6 + Math.random() * 20;
    const h = 0.5 + Math.random() * 2;
    const stag = new THREE.Mesh(
      new THREE.ConeGeometry(0.12 + Math.random() * 0.2, h, 5),
      stoneDark
    );
    stag.position.set(Math.cos(angle) * dist, h / 2, Math.sin(angle) * dist);
    stag.castShadow = true;
    addEnv(stag);
  }

  // Crystal clusters
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 4 + Math.random() * 22;
    const cluster = new THREE.Group();
    const count = 2 + Math.floor(Math.random() * 3);
    for (let c = 0; c < count; c++) {
      const ch = 0.4 + Math.random() * 1.2;
      const crystal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.08 + Math.random() * 0.08, ch, 5),
        Math.random() > 0.4 ? crystalMat : crystalPurple
      );
      crystal.position.set((Math.random() - 0.5) * 0.3, ch / 2, (Math.random() - 0.5) * 0.3);
      crystal.rotation.z = (Math.random() - 0.5) * 0.4;
      crystal.rotation.x = (Math.random() - 0.5) * 0.3;
      cluster.add(crystal);
    }
    cluster.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(cluster);
  }

  // Boulders
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 20;
    const s = 0.4 + Math.random() * 0.8;
    const boulder = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), stoneDark);
    boulder.position.set(Math.cos(angle) * dist, s * 0.35, Math.sin(angle) * dist);
    boulder.rotation.set(Math.random(), Math.random(), Math.random());
    boulder.castShadow = true;
    addEnv(boulder);
  }

  // Glowing floor cracks (flat emissive planes)
  for (let i = 0; i < 10; i++) {
    const crack = new THREE.Mesh(
      new THREE.PlaneGeometry(0.1, 1.5 + Math.random() * 2),
      new THREE.MeshBasicMaterial({ color: 0x3344aa, transparent: true, opacity: 0.3 })
    );
    crack.rotation.x = -Math.PI / 2;
    crack.rotation.z = Math.random() * Math.PI;
    crack.position.set((Math.random() - 0.5) * 35, 0.02, (Math.random() - 0.5) * 35);
    addEnv(crack);
  }
}

function buildVolcano() {
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x2a1a10, roughness: 0.9 });
  const lavaMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 1.0 });
  const magmaMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.6 });
  const ashMat = new THREE.MeshStandardMaterial({ color: 0x1a1210, roughness: 0.95 });

  // Lava pools (glowing circles on ground)
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 6 + Math.random() * 18;
    const pool = new THREE.Group();
    const r = 0.8 + Math.random() * 1.5;
    const glow = new THREE.Mesh(
      new THREE.CircleGeometry(r, 16),
      new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.4 })
    );
    glow.rotation.x = -Math.PI / 2; glow.position.y = 0.02;
    pool.add(glow);
    const surface = new THREE.Mesh(
      new THREE.CircleGeometry(r * 0.7, 12),
      magmaMat
    );
    surface.rotation.x = -Math.PI / 2; surface.position.y = 0.03;
    pool.add(surface);
    // Ring of rocks around pool
    for (let j = 0; j < 8; j++) {
      const a = (j / 8) * Math.PI * 2;
      const rk = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.15 + Math.random() * 0.15, 0), rockMat
      );
      rk.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
      pool.add(rk);
    }
    pool.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(pool);
  }

  // Volcanic rocks / formations
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 22;
    const s = 0.3 + Math.random() * 1.0;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
    rock.position.set(Math.cos(angle) * dist, s * 0.35, Math.sin(angle) * dist);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.castShadow = true;
    addEnv(rock);
  }

  // Obsidian spires
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 18;
    const h = 1.5 + Math.random() * 3;
    const spire = new THREE.Mesh(
      new THREE.ConeGeometry(0.2 + Math.random() * 0.15, h, 5),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3, metalness: 0.4 })
    );
    spire.position.set(Math.cos(angle) * dist, h / 2, Math.sin(angle) * dist);
    spire.castShadow = true;
    addEnv(spire);
  }

  // Embers (floating particles - small glowing spheres)
  for (let i = 0; i < 30; i++) {
    const ember = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 4, 4),
      new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0xff4400 : 0xff8800 })
    );
    ember.position.set((Math.random() - 0.5) * 40, 0.5 + Math.random() * 5, (Math.random() - 0.5) * 40);
    ember.userData.floatSeed = Math.random() * 100;
    addEnv(ember);
  }

  // Ash ground patches
  for (let i = 0; i < 15; i++) {
    const patch = new THREE.Mesh(
      new THREE.CircleGeometry(0.5 + Math.random() * 1, 8),
      new THREE.MeshStandardMaterial({ color: 0x0e0a08, roughness: 1.0 })
    );
    patch.rotation.x = -Math.PI / 2; patch.position.y = 0.01;
    patch.position.set((Math.random() - 0.5) * 35, 0.01, (Math.random() - 0.5) * 35);
    addEnv(patch);
  }
}

function buildUnderwater() {
  const coralMat1 = new THREE.MeshStandardMaterial({ color: 0xff4488, emissive: 0x661133, emissiveIntensity: 0.3 });
  const coralMat2 = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x663311, emissiveIntensity: 0.3 });
  const coralMat3 = new THREE.MeshStandardMaterial({ color: 0x44ddaa, emissive: 0x116644, emissiveIntensity: 0.3 });
  const sandMat = new THREE.MeshStandardMaterial({ color: 0x2a3545, roughness: 0.9 });
  const ruinMat = new THREE.MeshStandardMaterial({ color: 0x3a4a5a, roughness: 0.75 });

  // Coral formations
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 21;
    const coral = new THREE.Group();
    const branches = 2 + Math.floor(Math.random() * 4);
    const mat = [coralMat1, coralMat2, coralMat3][Math.floor(Math.random() * 3)];
    for (let b = 0; b < branches; b++) {
      const h = 0.4 + Math.random() * 1.2;
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.08 + Math.random() * 0.06, h, 5),
        mat
      );
      branch.position.set((Math.random() - 0.5) * 0.3, h / 2, (Math.random() - 0.5) * 0.3);
      branch.rotation.z = (Math.random() - 0.5) * 0.5;
      branch.rotation.x = (Math.random() - 0.5) * 0.4;
      coral.add(branch);
      // Bulb tip
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 5, 5), mat);
      tip.position.copy(branch.position); tip.position.y += h / 2;
      coral.add(tip);
    }
    coral.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(coral);
  }

  // Seaweed (tall thin swaying objects)
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 4 + Math.random() * 22;
    const weed = new THREE.Group();
    const segments = 3 + Math.floor(Math.random() * 3);
    const weedMat = new THREE.MeshStandardMaterial({ color: 0x115533, transparent: true, opacity: 0.8 });
    for (let s = 0; s < segments; s++) {
      const seg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.5, 0.03), weedMat);
      seg.position.y = 0.25 + s * 0.45;
      seg.rotation.z = Math.sin(s * 0.8) * 0.2;
      weed.add(seg);
    }
    weed.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    weed.userData.floatSeed = Math.random() * 100;
    addEnv(weed);
  }

  // Ruin pillars (broken columns)
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 16;
    const pillar = new THREE.Group();
    const h = 1.5 + Math.random() * 2.5;
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, h, 8), ruinMat);
    col.position.y = h / 2; col.castShadow = true; pillar.add(col);
    // Capital / base plates
    const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.12, 8), ruinMat);
    plate.position.y = h; pillar.add(plate);
    const baseP = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.12, 8), ruinMat);
    baseP.position.y = 0.06; pillar.add(baseP);
    // Some are broken / tilted
    if (Math.random() > 0.5) pillar.rotation.z = (Math.random() - 0.5) * 0.3;
    pillar.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
    addEnv(pillar);
  }

  // Bubbles
  for (let i = 0; i < 25; i++) {
    const bubble = new THREE.Mesh(
      new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.35 })
    );
    bubble.position.set((Math.random() - 0.5) * 40, 0.5 + Math.random() * 5, (Math.random() - 0.5) * 40);
    bubble.userData.floatSeed = Math.random() * 100;
    addEnv(bubble);
  }

  // Sand mounds
  for (let i = 0; i < 10; i++) {
    const mound = new THREE.Mesh(
      new THREE.SphereGeometry(0.6 + Math.random() * 0.8, 7, 4, 0, Math.PI * 2, 0, Math.PI * 0.5),
      sandMat
    );
    mound.rotation.x = 0;
    mound.position.set((Math.random() - 0.5) * 35, 0, (Math.random() - 0.5) * 35);
    addEnv(mound);
  }

  // Glowing shells
  for (let i = 0; i < 6; i++) {
    const shell = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x22ccff, emissive: 0x1199cc, emissiveIntensity: 0.6 })
    );
    shell.position.set((Math.random() - 0.5) * 30, 0.12, (Math.random() - 0.5) * 30);
    shell.scale.y = 0.5;
    addEnv(shell);
  }
}

// Animate floating env objects (fireflies, embers, bubbles, seaweed)
function updateEnvironment(dt) {
  const t = clock.elapsedTime;
  envObjects.forEach(obj => {
    if (obj.userData.floatSeed !== undefined) {
      const seed = obj.userData.floatSeed;
      obj.position.y += Math.sin(t * 1.5 + seed) * 0.003;
      obj.position.x += Math.sin(t * 0.7 + seed * 2) * 0.002;
      obj.position.z += Math.cos(t * 0.5 + seed * 3) * 0.002;
    }
    // Seaweed sway for groups with floatSeed
    if (obj.isGroup && obj.userData.floatSeed !== undefined) {
      obj.rotation.z = Math.sin(t * 1.2 + obj.userData.floatSeed) * 0.08;
    }
  });
}

function spawnWave() {
  waveCleared = false;

  // Switch biome every 5 waves
  const biomeIndex = Math.floor((wave - 1) / 5) % BIOME_ORDER.length;
  const newBiome = BIOME_ORDER[biomeIndex];
  if (newBiome !== currentBiome) {
    switchBiome(newBiome);
  }

  const numMelee = Math.min(3 + wave * 2, 25);
  const numRanged = wave >= 2 ? Math.min(Math.floor(wave * 0.8), 10) : 0;
  const hasBoss = wave % 5 === 0;

  monstersToSpawn = numMelee + numRanged + (hasBoss ? 1 : 0);
  spawnTimer = 0;

  // Show wave banner with biome name
  const banner = document.getElementById('waveBanner');
  const b = BIOMES[currentBiome];
  if (hasBoss) {
    banner.textContent = `⚠️ 波次 ${wave} — ${b.name} BOSS 來襲！`;
  } else if ((wave - 1) % 5 === 0) {
    banner.textContent = `🌍 ${b.name} — 波次 ${wave}`;
  } else {
    banner.textContent = `波次 ${wave}`;
  }
  banner.style.opacity = '1';
  setTimeout(() => banner.style.opacity = '0', 2500);

  // Queue spawn data
  player._spawnQueue = [];
  for (let i = 0; i < numMelee; i++) player._spawnQueue.push('melee');
  for (let i = 0; i < numRanged; i++) player._spawnQueue.push('ranged');
  if (hasBoss) player._spawnQueue.push('boss');

  document.getElementById('hudWave').textContent = `波次 ${wave}`;
}

function getSpawnPos() {
  const angle = Math.random() * Math.PI * 2;
  const dist = 18 + Math.random() * 6;
  return new THREE.Vector3(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);
}

// ══════════════════════════════════════
// COMBAT
// ══════════════════════════════════════
function playerAttack() {
  if (player.atkCooldown > 0 || gameState !== 'playing') return;
  player.atkCooldown = player.atkSpeed;

  const dir = new THREE.Vector3(mousePos.x, 0, mousePos.y).sub(player.mesh.position).normalize();
  player.mesh.lookAt(player.mesh.position.x + dir.x, player.mesh.position.y, player.mesh.position.z + dir.z);

  if (player.atkType === 'melee') {
    // Melee slash — hit all in cone
    const slashRange = player.range * player.areaScale;
    spawnSlashEffect(player.mesh.position, dir, slashRange, player.color);
    monsters.forEach(m => {
      if (!m.alive) return;
      const toM = m.mesh.position.clone().sub(player.mesh.position);
      const dist = toM.length();
      if (dist < slashRange) {
        const dot = toM.normalize().dot(dir);
        if (dot > 0.3) {
          dealDamage(m, calcDamage());
        }
      }
    });
  } else {
    // Projectile
    const shots = 1 + (player.className === 'archer' ? player.multiShot : 0);
    for (let i = 0; i < shots; i++) {
      const spread = shots > 1 ? (i - (shots - 1) / 2) * 0.2 : 0;
      const d = dir.clone();
      d.applyAxisAngle(new THREE.Vector3(0, 1, 0), spread);
      spawnProjectile(player.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0)), d, true);
    }
  }
}

function calcDamage() {
  let dmg = player.atk;
  if (player.hasRage) {
    const hpRatio = player.hp / player.maxHp;
    dmg *= 1 + (1 - hpRatio) * 0.8;
  }
  let crit = false;
  if (Math.random() < player.critChance) {
    dmg *= player.critDmg;
    crit = true;
  }
  return { dmg: Math.round(dmg), crit };
}

function dealDamage(monster, { dmg, crit }) {
  monster.hp -= dmg;
  // Lifesteal
  if (player.lifesteal > 0) {
    player.hp = Math.min(player.maxHp, player.hp + dmg * player.lifesteal);
  }
  // Thorns visual (thorns applies when monster attacks player, handled elsewhere)
  // Update HP bar
  const ratio = Math.max(0, monster.hp / monster.maxHp);
  monster.hpBarFill.scale.x = ratio;
  monster.hpBarFill.position.x = -(1 - ratio) * monster.barWidth * 0.5;

  // Damage number
  showDamageNumber(monster.mesh.position, dmg, crit);
  // Hit particle
  spawnHitParticles(monster.mesh.position, player.color);

  if (monster.hp <= 0) {
    killMonster(monster);
  }
}

function killMonster(m) {
  m.alive = false;
  spawnDeathParticles(m.mesh.position, m.type === 'boss' ? 30 : 10);
  scene.remove(m.mesh);
  killCount++;
  const xpGain = Math.round(m.xpVal * player.xpMult);
  player.xp += xpGain;
  document.getElementById('hudKills').textContent = `擊殺 ${killCount}`;
  checkLevelUp();
  // Chain lightning
  if (player.chainCount > 0 && player.atkType === 'projectile') {
    let chainLeft = player.chainCount;
    let lastPos = m.mesh.position.clone();
    monsters.forEach(cm => {
      if (!cm.alive || chainLeft <= 0) return;
      if (cm.mesh.position.distanceTo(lastPos) < 6) {
        dealDamage(cm, { dmg: Math.round(player.atk * 0.6), crit: false });
        chainLeft--;
        lastPos = cm.mesh.position.clone();
      }
    });
  }
}

function monsterAttack(m, dt) {
  m.atkCooldown -= dt;
  if (m.atkCooldown > 0) return;
  const dist = m.mesh.position.distanceTo(player.mesh.position);

  if (m.type === 'ranged') {
    if (dist < 12) {
      m.atkCooldown = 2.0;
      const dir = player.mesh.position.clone().sub(m.mesh.position).normalize();
      spawnProjectile(m.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0)), dir, false);
    }
  } else {
    if (dist < 1.8 * (m.type === 'boss' ? 2 : 1)) {
      m.atkCooldown = 1.2;
      let dmg = m.atk;
      dmg *= (1 - player.damageReduction);
      player.hp -= dmg;
      if (player.thorns > 0) {
        m.hp -= dmg * player.thorns;
        const ratio = Math.max(0, m.hp / m.maxHp);
        m.hpBarFill.scale.x = ratio;
        if (m.hp <= 0) killMonster(m);
      }
      player.invincibleTimer = 0.15;
      showDamageNumber(player.mesh.position, Math.round(dmg), false, '#ff4444');
      if (player.hp <= 0) gameOver();
    }
  }
}

// ══════════════════════════════════════
// PROJECTILES
// ══════════════════════════════════════
function spawnProjectile(pos, dir, isPlayer) {
  const geo = new THREE.SphereGeometry(isPlayer ? 0.2 * player.areaScale : 0.18, 8, 8);
  let col;
  if (isPlayer) {
    col = player.className === 'mage' ? 0xff6600 : 0x88ff44;
  } else {
    col = 0xaa44ff;
  }
  const mat = new THREE.MeshBasicMaterial({ color: col });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);

  projectiles.push({
    mesh, dir: dir.clone(), speed: isPlayer ? 18 : 10, isPlayer,
    life: 2.0, dmg: isPlayer ? calcDamage() : { dmg: 0, crit: false },
    hitTargets: []
  });
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.mesh.position.add(p.dir.clone().multiplyScalar(p.speed * dt));
    p.life -= dt;

    if (p.isPlayer) {
      for (let j = monsters.length - 1; j >= 0; j--) {
        const m = monsters[j];
        if (!m.alive || p.hitTargets.includes(m)) continue;
        const dx = p.mesh.position.x - m.mesh.position.x;
        const dz = p.mesh.position.z - m.mesh.position.z;
        const hDist = Math.sqrt(dx * dx + dz * dz);
        if (hDist < 1.2 * m.size) {
          dealDamage(m, p.dmg);
          p.hitTargets.push(m);
          if (!player.pierce) { p.life = 0; break; }
        }
      }
    } else {
      const dx2 = p.mesh.position.x - player.mesh.position.x;
      const dz2 = p.mesh.position.z - player.mesh.position.z;
      const hDist2 = Math.sqrt(dx2 * dx2 + dz2 * dz2);
      if (hDist2 < 1.0 && player.invincibleTimer <= 0) {
        let dmg = 10 * (1 + (wave - 1) * 0.12);
        dmg *= (1 - player.damageReduction);
        player.hp -= dmg;
        showDamageNumber(player.mesh.position, Math.round(dmg), false, '#ff4444');
        player.invincibleTimer = 0.3;
        if (player.hp <= 0) gameOver();
        p.life = 0;
      }
    }

    if (p.life <= 0 || p.mesh.position.length() > 35) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    }
  }
}

// ══════════════════════════════════════
// EFFECTS
// ══════════════════════════════════════
function spawnSlashEffect(pos, dir, range, color) {
  const geo = new THREE.RingGeometry(0.3, range, 16, 1, -0.8, 1.6);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, 0.5, pos.z);
  mesh.rotation.x = -Math.PI / 2;
  mesh.rotation.z = -Math.atan2(dir.z, dir.x);
  scene.add(mesh);
  particles.push({ mesh, life: 0.3, maxLife: 0.3, type: 'slash' });
}

function spawnHitParticles(pos, color) {
  for (let i = 0; i < 5; i++) {
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x + (Math.random() - 0.5), pos.y + 1 + Math.random(), pos.z + (Math.random() - 0.5));
    scene.add(mesh);
    particles.push({
      mesh, life: 0.5, maxLife: 0.5, type: 'hit',
      vel: new THREE.Vector3((Math.random() - 0.5) * 4, Math.random() * 5, (Math.random() - 0.5) * 4)
    });
  }
}

function spawnDeathParticles(pos, count) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
    const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(Math.random() * 0.1, 0.8, 0.5) });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, 0.5, pos.z);
    scene.add(mesh);
    particles.push({
      mesh, life: 1.0, maxLife: 1.0, type: 'hit',
      vel: new THREE.Vector3((Math.random() - 0.5) * 8, Math.random() * 8 + 2, (Math.random() - 0.5) * 8)
    });
  }
}

function spawnLevelUpEffect() {
  for (let i = 0; i < 30; i++) {
    const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
    const mesh = new THREE.Mesh(geo, mat);
    const angle = (i / 30) * Math.PI * 2;
    mesh.position.set(player.mesh.position.x + Math.cos(angle) * 1.5, 0.2, player.mesh.position.z + Math.sin(angle) * 1.5);
    scene.add(mesh);
    particles.push({
      mesh, life: 1.2, maxLife: 1.2, type: 'hit',
      vel: new THREE.Vector3(Math.cos(angle) * 2, 6 + Math.random() * 3, Math.sin(angle) * 2)
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.type === 'slash') {
      p.mesh.material.opacity = (p.life / p.maxLife) * 0.5;
    } else if (p.type === 'hit') {
      p.vel.y -= 12 * dt;
      p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
      p.mesh.material.opacity = p.life / p.maxLife;
      p.mesh.material.transparent = true;
    }
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }
}

function showDamageNumber(pos3D, dmg, crit, color) {
  const vec = pos3D.clone();
  vec.y += 2;
  vec.project(camera);
  const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;

  const el = document.createElement('div');
  el.className = 'dmg-num' + (crit ? ' crit' : '');
  el.textContent = (crit ? '暴擊 ' : '') + dmg;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color || (crit ? '#ff4444' : '#ffdd44');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ══════════════════════════════════════
// LEVELING
// ══════════════════════════════════════
function checkLevelUp() {
  while (player.xp >= player.xpToNext) {
    player.xp -= player.xpToNext;
    player.level++;
    player.xpToNext = Math.round(20 * Math.pow(1.35, player.level - 1));
    player.hp = player.maxHp; // Full heal on level up
    spawnLevelUpEffect();
    showLevelUpModal();
  }
  updateHUD();
}

function showLevelUpModal() {
  gameState = 'levelup';
  const modal = document.getElementById('levelUpModal');
  modal.classList.add('show');
  document.getElementById('lvSubText').textContent = `等級 ${player.level} — 選擇一項強化`;

  // Pick 3 random upgrades
  const pool = [...UPGRADE_POOL, ...(CLASS_UPGRADES[player.className] || [])];
  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3);

  const container = document.getElementById('upgradeCards');
  container.innerHTML = '';
  shuffled.forEach(up => {
    const card = document.createElement('div');
    card.className = 'upgrade-card';
    card.innerHTML = `<div class="up-icon">${up.icon}</div><h4>${up.name}</h4><p>${up.desc}</p>`;
    card.onclick = () => {
      up.apply(player);
      modal.classList.remove('show');
      gameState = 'playing';
      updateHUD();
    };
    container.appendChild(card);
  });
}

// ══════════════════════════════════════
// HUD
// ══════════════════════════════════════
function updateHUD() {
  const hpPct = Math.max(0, (player.hp / player.maxHp) * 100);
  const xpPct = (player.xp / player.xpToNext) * 100;
  document.getElementById('hpBar').style.width = hpPct + '%';
  document.getElementById('hpLabel').textContent = `${Math.round(player.hp)}/${Math.round(player.maxHp)}`;
  document.getElementById('xpBar').style.width = xpPct + '%';
  document.getElementById('xpLabel').textContent = `${player.xp}/${player.xpToNext}`;
  document.getElementById('hudLevel').textContent = `Lv.${player.level}`;
}

// ══════════════════════════════════════
// GAME OVER
// ══════════════════════════════════════
function gameOver() {
  if (gameState === 'gameover') return;
  gameState = 'gameover';
  document.getElementById('hud').classList.remove('show');
  document.getElementById('controlsHint').classList.remove('show');
  const screen = document.getElementById('gameOverScreen');
  screen.classList.remove('hidden');
  document.getElementById('goStats').innerHTML =
    `職業：${CLASS_DATA[player.className].name}<br>` +
    `等級：${player.level}<br>` +
    `波次：${wave}<br>` +
    `擊殺：${killCount}`;
}

// ══════════════════════════════════════
// INPUT
// ══════════════════════════════════════
function initInput() {
  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  const raycaster = new THREE.Raycaster();
  const mouseNDC = new THREE.Vector2();

  window.addEventListener('mousemove', e => {
    mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouseNDC, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, pt);
    if (pt) { mousePos.set(pt.x, pt.z); }
  });

  window.addEventListener('mousedown', e => {
    if (e.button === 0) playerAttack();
  });
}

// ══════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════
function startGame(className) {
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('hud').classList.add('show');
  document.getElementById('controlsHint').classList.add('show');

  createPlayer(className);
  gameState = 'playing';
  wave = 1;
  killCount = 0;
  spawnWave();
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState === 'playing') {
    // Player movement
    const move = new THREE.Vector3();
    if (keys['w'] || keys['arrowup']) move.z -= 1;
    if (keys['s'] || keys['arrowdown']) move.z += 1;
    if (keys['a'] || keys['arrowleft']) move.x -= 1;
    if (keys['d'] || keys['arrowright']) move.x += 1;
    if (move.length() > 0) {
      move.normalize().multiplyScalar(player.speed * dt);
      player.mesh.position.add(move);
      // Clamp to arena
      const maxR = 26;
      if (player.mesh.position.length() > maxR) {
        player.mesh.position.normalize().multiplyScalar(maxR);
      }
      // Face movement direction when not attacking
      if (player.atkCooldown <= player.atkSpeed * 0.5) {
        player.mesh.lookAt(player.mesh.position.x + move.x, player.mesh.position.y, player.mesh.position.z + move.z);
      }
    }

    // Player bob animation
    player.mesh.position.y = Math.sin(clock.elapsedTime * 3) * 0.05;
    // Mage crystal spin
    if (player.mesh.userData.crystal) {
      player.mesh.userData.crystal.rotation.y = clock.elapsedTime * 2;
      player.mesh.userData.crystal.rotation.x = Math.sin(clock.elapsedTime * 1.5) * 0.3;
    }
    // Ring pulse
    const ring = player.mesh.userData.ring;
    if (ring) {
      ring.material.opacity = 0.2 + Math.sin(clock.elapsedTime * 4) * 0.1;
    }

    // Cooldowns
    player.atkCooldown = Math.max(0, player.atkCooldown - dt);
    player.invincibleTimer = Math.max(0, player.invincibleTimer - dt);

    // Regen
    if (player.regen > 0) {
      player.hp = Math.min(player.maxHp, player.hp + player.regen * dt);
    }

    // Camera follow
    const camTarget = new THREE.Vector3(player.mesh.position.x, 22, player.mesh.position.z + 16);
    camera.position.lerp(camTarget, 3 * dt);
    camera.lookAt(player.mesh.position.x, 0, player.mesh.position.z);

    // Monster AI
    monsters.forEach(m => {
      if (!m.alive) return;
      const toPlayer = player.mesh.position.clone().sub(m.mesh.position);
      const dist = toPlayer.length();

      // Move toward player (ranged keep distance)
      let desiredDist = m.type === 'ranged' ? 8 : 1.0;
      if (dist > desiredDist + 0.5) {
        const moveDir = toPlayer.normalize().multiplyScalar(m.speed * dt);
        m.mesh.position.add(moveDir);
      } else if (m.type === 'ranged' && dist < desiredDist - 1) {
        const moveDir = toPlayer.normalize().multiplyScalar(-m.speed * dt * 0.5);
        m.mesh.position.add(moveDir);
      }
      m.mesh.lookAt(player.mesh.position.x, m.mesh.position.y, player.mesh.position.z);

      // Monster bob & float
      if (m.type === 'ranged') {
        m.mesh.position.y = Math.sin(clock.elapsedTime * 2.5 + m.mesh.id) * 0.15 + 0.15;
      } else {
        m.mesh.position.y = Math.sin(clock.elapsedTime * 2 + m.mesh.id) * 0.03;
      }

      // HP bar face camera
      m.hpBarBg.lookAt(camera.position);
      m.hpBarFill.lookAt(camera.position);

      monsterAttack(m, dt);
    });

    // Spawning
    if (player._spawnQueue && player._spawnQueue.length > 0) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnTimer = 0.4;
        const type = player._spawnQueue.shift();
        createMonster(type, getSpawnPos());
      }
    }

    // Check wave clear
    const aliveCount = monsters.filter(m => m.alive).length;
    if (aliveCount === 0 && (!player._spawnQueue || player._spawnQueue.length === 0) && !waveCleared) {
      waveCleared = true;
      wave++;
      setTimeout(() => {
        if (gameState === 'playing') spawnWave();
      }, 2000);
    }

    // Clean dead monsters from array periodically
    if (monsters.length > 50) {
      monsters = monsters.filter(m => m.alive);
    }

    updateProjectiles(dt);
    updateParticles(dt);
    updateEnvironment(dt);
    updateHUD();
  } else if (gameState === 'levelup') {
    // Still render but freeze gameplay
    updateParticles(dt);
  }

  renderer.render(scene, camera);
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
initThree();
switchBiome('forest');
initInput();
</script>
