<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 全域碰撞生死鬥</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00FF41; pointer-events: none; z-index: 10; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100;
        }
        button {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: #22ff00; border: none; border-radius: 50px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5.0</h2>
        <p>⚠️ 只要頭碰到別人的身體就死掉了！</p>
    </div>

    <div id="overlay">
        <h1 id="deathMsg">💥 撞車陣亡！</h1>
        <button onclick="resetGame()">重新復活</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overlay = document.getElementById('overlay');

    const WORLD_SIZE = 1500;
    const SNAKE_SIZE = 9;
    let snakes = [];
    let foods = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 蛇的物件導向設計 ---
    class Snake {
        constructor(x, y, color, isPlayer = false) {
            this.x = x; this.y = y;
            this.color = color;
            this.isPlayer = isPlayer;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
            this.bodyLength = 5;
            this.history = [];
            this.alive = true;
            this.speed = 1.2;
            this.turnTimer = 0;
            // 預填路徑
            for(let i=0; i<800; i++) this.history.push({x: this.x, y: this.y});
        }

        update(mouse) {
            if (!this.alive) return;

            let currentSpeed = this.speed;
            if (this.isPlayer) {
                // 玩家跟隨滑鼠
                let dx = mouse.x - canvas.width / 2;
                let dy = mouse.y - canvas.height / 2;
                this.targetAngle = Math.atan2(dy, dx);
            } else {
                // AI 隨機亂走
                this.turnTimer--;
                if (this.turnTimer <= 0) {
                    this.targetAngle += (Math.random() - 0.5) * 1.5;
                    this.turnTimer = 40 + Math.random() * 60;
                }
            }

            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.08;

            this.x += Math.cos(this.angle) * currentSpeed;
            this.y += Math.sin(this.angle) * currentSpeed;

            // 邊界檢查
            if (this.x <= 0 || this.x >= WORLD_SIZE || this.y <= 0 || this.y >= WORLD_SIZE) {
                this.die();
            }

            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 2000) this.history.pop();
        }

        die() {
            this.alive = false;
            if (this.isPlayer) overlay.style.display = 'flex';
        }

        draw() {
            if (!this.alive) return;
            // 畫立體肉感身體 (由尾至頭)
            for (let i = Math.floor(this.bodyLength * 3); i > 0; i--) {
                let index = i * 10; // 間距拉開一點方便碰撞
                let pos = this.history[index];
                if (pos) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SNAKE_SIZE * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 5; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            // 畫蛇頭與大眼睛
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.beginPath(); ctx.arc(0, 0, SNAKE_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(5, -4, 4, 0, Math.PI * 2); ctx.arc(5, 4, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI * 2); ctx.arc(6, 4, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function resetGame() {
        overlay.style.display = 'none';
        snakes = [
            new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#ff6666', true), // 玩家
            new Snake(200, 200, '#00CCFF'),
            new Snake(WORLD_SIZE-200, 200, '#FFAA00'),
            new Snake(200, WORLD_SIZE-200, '#FF00FF'),
            new Snake(WORLD_SIZE-200, WORLD_SIZE-200, '#00FF88')
        ];
        foods = [];
        for(let i=0; i<100; i++) createFood();
    }

    function createFood() {
        foods.push({
            x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE,
            size: Math.random() * 2 + 2, color: `hsl(${Math.random()*360}, 100%, 70%)`
        });
    }

    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function gameLoop() {
        let player = snakes.find(s => s.isPlayer);
        let camX = canvas.width / 2 - player.x;
        let camY = canvas.height / 2 - player.y;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camX, camY);

        // 畫地圖與紅色邊界
        ctx.fillStyle = '#080808'; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = 'red'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // 更新與碰撞偵測
        snakes.forEach(s => {
            if (!s.alive) return;
            s.update(mouse);

            // --- 核心：碰撞偵測邏輯 ---
            snakes.forEach(target => {
                if (!target.alive) return;
                // 檢查 s 的頭是否碰到 target 的身體 (跳過自己的頭部)
                let startIndex = (s === target) ? 30 : 10; 
                for (let i = startIndex; i < target.bodyLength * 10; i += 5) {
                    let part = target.history[i];
                    if (part && Math.hypot(s.x - part.x, s.y - part.y) < SNAKE_SIZE * 1.4) {
                        s.die();
                    }
                }
            });

            // 吃食物
            foods.forEach((f, i) => {
                if (Math.hypot(s.x - f.x, s.y - f.y) < SNAKE_SIZE + f.size) {
                    s.bodyLength += 0.2; foods.splice(i, 1); createFood();
                    if(s.isPlayer) scoreDisplay.innerText = `長度: ${s.bodyLength.toFixed(1)}`;
                }
            });

            s.draw();
        });

        // 畫食物
        foods.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fillStyle = f.color; ctx.fill();
        });

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
</script>
</body>
</html>
