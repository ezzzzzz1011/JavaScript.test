<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GitHub 連線暗棋 v.1.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; margin-top: 20px;}
        #lobby { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        #lobby input { padding: 5px; font-size: 16px; }
        #lobby button { padding: 5px 10px; font-size: 16px; cursor: pointer; }
        #game-info { margin: 10px 0; font-size: 18px; font-weight: bold; background: #fff; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 4px;
            background-color: #8b4513;
            padding: 8px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        #board.active { pointer-events: auto; opacity: 1; }
        .cell {
            width: 60px; height: 60px;
            background-color: #f5d7a6;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; cursor: pointer;
            border-radius: 50%; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.4);
            user-select: none; transition: transform 0.1s;
        }
        .cell:active { transform: scale(0.95); }
        .cell.hidden { background-color: #c97e3e; color: transparent; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
        .cell.hidden::after { content: "？"; color: #fff; font-size: 24px; opacity: 0.6; }
        .cell.empty { background-color: transparent; box-shadow: none; cursor: default; }
        .cell.red { color: #d32f2f; }
        .cell.black { color: #1e1e1e; }
        .cell.selected { border: 4px solid #4caf50; box-sizing: border-box; background-color: #ffeb3b; }

        /* 浮動提示訊息樣式 */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(50, 50, 50, 0.95);
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px 20px;
            position: fixed;
            z-index: 1000;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s, top 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            top: 40px;
        }
    </style>
</head>
<body>

    <div id="toast">提示訊息</div>

    <div id="lobby">
        <h3>♟️ P2P 連線暗棋 v.1.1</h3>
        <p>你的連線代碼: <strong id="my-id" style="color: #1976d2; user-select: all;">載入中...</strong></p>
        <hr>
        <input type="text" id="friend-id" placeholder="貼上朋友的代碼">
        <button onclick="connectToFriend()">加入遊戲</button>
    </div>

    <div id="game-info">等待連線中...</div>
    <div id="board"></div>

    <script>
        const PIECES = [
            { name: '帥', color: 'red', rank: 7 }, { name: '將', color: 'black', rank: 7 },
            { name: '仕', color: 'red', rank: 6 }, { name: '仕', color: 'red', rank: 6 }, { name: '士', color: 'black', rank: 6 }, { name: '士', color: 'black', rank: 6 },
            { name: '相', color: 'red', rank: 5 }, { name: '相', color: 'red', rank: 5 }, { name: '象', color: 'black', rank: 5 }, { name: '象', color: 'black', rank: 5 },
            { name: '俥', color: 'red', rank: 4 }, { name: '俥', color: 'red', rank: 4 }, { name: '車', color: 'black', rank: 4 }, { name: '車', color: 'black', rank: 4 },
            { name: '傌', color: 'red', rank: 3 }, { name: '傌', color: 'red', rank: 3 }, { name: '馬', color: 'black', rank: 3 }, { name: '馬', color: 'black', rank: 3 },
            { name: '炮', color: 'red', rank: 2 }, { name: '炮', color: 'red', rank: 2 }, { name: '包', color: 'black', rank: 2 }, { name: '包', color: 'black', rank: 2 },
            { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 }, { name: '兵', color: 'red', rank: 1 },
            { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }, { name: '卒', color: 'black', rank: 1 }
        ];

        let boardData = [];
        let myRole = null; 
        let currentTurn = 'host';
        let hostColor = null;  
        let guestColor = null; 
        let selectedIndex = -1;
        let conn = null; 

        function showMessage(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 2000);
        }

        const peer = new Peer();
        
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', (connection) => {
            conn = connection;
            myRole = 'host';
            setupConnection();
            initGameAsHost();
        });

        function connectToFriend() {
            const friendId = document.getElementById('friend-id').value;
            if (!friendId) return showMessage('請輸入代碼');
            conn = peer.connect(friendId);
            myRole = 'guest';
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('board').classList.add('active');
                updateInfo();
                showMessage("✅ 連線成功！遊戲開始");
            });

            conn.on('data', (data) => {
                if (data.type === 'sync') {
                    boardData = data.board;
                    currentTurn = data.turn;
                    hostColor = data.hostColor;
                    guestColor = data.guestColor;
                    selectedIndex = -1;
                    renderBoard();
                    updateInfo();
                }
            });
        }

        function initGameAsHost() {
            let shuffled = [...PIECES].sort(() => Math.random() - 0.5);
            boardData = shuffled.map(p => ({ ...p, isOpen: false, isEmpty: false }));
            currentTurn = 'host';
            hostColor = null;
            guestColor = null;
            syncGame();
            renderBoard();
            updateInfo();
        }

        function syncGame() {
            if (conn && conn.open) {
                conn.send({ type: 'sync', board: boardData, turn: currentTurn, hostColor, guestColor });
            }
        }

        function updateInfo() {
            let myAssignedColor = myRole === 'host' ? hostColor : guestColor;
            let colorStr = myAssignedColor === 'red' ? '🔴 紅方' : (myAssignedColor === 'black' ? '⚫ 黑方' : '⚪ 未定');
            const turnStr = currentTurn === myRole ? '🟢 你的回合' : '⏳ 等待對手';
            document.getElementById('game-info').innerText = `[v.1.1] 陣營: ${colorStr} | 狀態: ${turnStr}`;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardData.forEach((piece, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';

                if (piece.isEmpty) {
                    cell.classList.add('empty');
                } else if (!piece.isOpen) {
                    cell.classList.add('hidden');
                } else {
                    cell.classList.add(piece.color);
                    cell.innerText = piece.name;
                }

                if (index === selectedIndex) {
                    cell.classList.add('selected');
                }

                cell.onclick = () => handleCellClick(index);
                boardEl.appendChild(cell);
            });
        }

        function handleCellClick(index) {
            if (currentTurn !== myRole) {
                showMessage("⚠️ 現在是對手的回合");
                return;
            }

            const target = boardData[index];
            let myAssignedColor = myRole === 'host' ? hostColor : guestColor;

            // 1. 點擊自己的棋子 -> 選取 / 取消選取
            if (!target.isEmpty && target.isOpen && target.color === myAssignedColor) {
                selectedIndex = selectedIndex === index ? -1 : index;
                renderBoard();
                return;
            }

            // 2. 如果已經有選取自己的棋子，嘗試進行移動或吃子
            if (selectedIndex !== -1) {
                const attacker = boardData[selectedIndex];
                
                // 【修復的關鍵點】 確保目標「不是空地」且「未翻開」，才算點到暗棋
                if (!target.isEmpty && !target.isOpen && attacker.rank !== 2) {
                    selectedIndex = -1; // 自動取消選取
                } else {
                    const success = tryMoveOrCapture(selectedIndex, index);
                    if (success) return; 
                    else return; 
                }
            }

            // 3. 翻開暗棋 (在沒有選取任何棋子的狀態下)
            if (!target.isEmpty && !target.isOpen) {
                boardData[index].isOpen = true;
                
                // 首翻決定顏色
                if (!hostColor && !guestColor) {
                    if (myRole === 'host') {
                        hostColor = target.color;
                        guestColor = target.color === 'red' ? 'black' : 'red';
                    } else {
                        guestColor = target.color;
                        hostColor = target.color === 'red' ? 'black' : 'red';
                    }
                    showMessage(`你抽到了 ${hostColor === 'red' ? '紅方' : '黑方'}！`);
                }
                endTurn();
            }
        }

        function tryMoveOrCapture(fromIdx, toIdx) {
            const attacker = boardData[fromIdx];
            const target = boardData[toIdx];

            const r1 = Math.floor(fromIdx / 8), c1 = fromIdx % 8;
            const r2 = Math.floor(toIdx / 8), c2 = toIdx % 8;
            const isAdjacent = (Math.abs(r1 - r2) === 1 && c1 === c2) || (Math.abs(c1 - c2) === 1 && r1 === r2);

            if (attacker.rank === 2) { 
                // 【炮/包】
                if (target.isEmpty) {
                    if (isAdjacent) {
                        doMove(fromIdx, toIdx); return true;
                    } else {
                        showMessage("⚠️ 炮移動空地只能走一步"); return false;
                    }
                } else {
                    if (isValidCannonJump(fromIdx, toIdx)) {
                        doMove(fromIdx, toIdx); return true;
                    } else {
                        showMessage("⚠️ 炮必須剛好隔一顆棋子才能跳吃"); return false;
                    }
                }
            } else {
                // 【一般棋子】
                if (!isAdjacent) {
                    showMessage("⚠️ 只能移動一格"); return false;
                }
                if (target.isEmpty) {
                    doMove(fromIdx, toIdx); return true; // 修復後，空地移動會在這邊順利執行
                } else if (!target.isOpen) {
                    showMessage("⚠️ 一般棋子不能吃暗棋"); return false;
                } else {
                    if (canCapture(attacker, target)) {
                        doMove(fromIdx, toIdx); return true;
                    } else {
                        showMessage("⚠️ 階級不足，無法吃子"); return false;
                    }
                }
            }
        }

        function canCapture(attacker, target) {
            if (attacker.rank === 1 && target.rank === 7) return true; // 兵吃帥
            if (attacker.rank === 7 && target.rank === 1) return false; // 帥不能吃兵
            return attacker.rank >= target.rank;
        }

        function isValidCannonJump(fromIdx, toIdx) {
            const r1 = Math.floor(fromIdx / 8), c1 = fromIdx % 8;
            const r2 = Math.floor(toIdx / 8), c2 = toIdx % 8;
            
            if (r1 !== r2 && c1 !== c2) return false; 

            let piecesBetween = 0;
            if (r1 === r2) { 
                const min = Math.min(c1, c2), max = Math.max(c1, c2);
                for (let i = min + 1; i < max; i++) {
                    if (!boardData[r1 * 8 + i].isEmpty) piecesBetween++;
                }
            } else { 
                const min = Math.min(r1, r2), max = Math.max(r1, r2);
                for (let i = min + 1; i < max; i++) {
                    if (!boardData[i * 8 + c1].isEmpty) piecesBetween++;
                }
            }
            return piecesBetween === 1; 
        }

        function doMove(fromIdx, toIdx) {
            boardData[toIdx] = boardData[fromIdx]; 
            boardData[fromIdx] = { isEmpty: true }; 
            endTurn();
        }

        function endTurn() {
            currentTurn = currentTurn === 'host' ? 'guest' : 'host';
            selectedIndex = -1;
            syncGame(); 
            renderBoard();
            updateInfo();
        }
    </script>
</body>
</html>
