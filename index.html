<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 多蛇大亂鬥</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00FF41; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5</h2>
        <p id="status">大亂鬥模式：別碰到任何蛇的身體！</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const SNAKE_SIZE = 7;

    // --- 蛇的類別 (用來產生很多條蛇) ---
    class Snake {
        constructor(x, y, color, isPlayer = false) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.isPlayer = isPlayer;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
            this.speed = isPlayer ? 1.2 : 1.0;
            this.history = [];
            this.bodyLength = 5 + Math.random() * 5;
            this.alive = true;
            this.turnTimer = 0;

            // 預填初始路徑
            for(let i=0; i<500; i++) this.history.push({x: this.x, y: this.y});
        }

        update(mouse) {
            if (!this.alive) return;

            let currentSpeed = this.speed;
            if (this.isPlayer) {
                this.targetAngle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
            } else {
                this.turnTimer--;
                if (this.turnTimer <= 0) {
                    this.targetAngle += (Math.random() - 0.5) * 1.5;
                    this.turnTimer = Math.random() * 100 + 50;
                }
            }

            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.08;

            this.x += Math.cos(this.angle) * currentSpeed;
            this.y += Math.sin(this.angle) * currentSpeed;

            // 邊界反彈
            if (this.x < 0 || this.x > canvas.width) this.angle = Math.PI - this.angle;
            if (this.y < 0 || this.y > canvas.height) this.angle = -this.angle;

            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 2000) this.history.pop();
        }

        draw() {
            if (!this.alive) return;
            // 畫身體
            for (let i = Math.floor(this.bodyLength * 3); i > 0; i--) {
                let index = i * 6;
                let pos = this.history[index];
                if (pos) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SNAKE_SIZE * 0.9, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.5;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
            // 畫頭
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.beginPath(); ctx.arc(0, 0, SNAKE_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.strokeStyle = '#000'; ctx.stroke();
            // 眼睛
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(4, -3, 3, 0, Math.PI * 2); ctx.arc(4, 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    // --- 初始化遊戲內容 ---
    let player = new Snake(canvas.width/2, canvas.height/2, '#22ff00', true);
    let enemies = [
        new Snake(100, 100, '#ff0055'),
        new Snake(canvas.width-100, 100, '#ffaa00'),
        new Snake(100, canvas.height-100, '#00aaff'),
        new Snake(canvas.width-100, canvas.height-100, '#ff00ff'),
        new Snake(canvas.width/2, 50, '#ffffff')
    ];

    let foods = [];
    for(let i=0; i<80; i++) createFood();

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 2,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: player.x, y: player.y };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function gameLoop() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 更新玩家與敵人
        player.update(mouse);
        enemies.forEach(enemy => enemy.update());

        // 2. 碰撞偵測核心
        let allSnakes = [player, ...enemies];
        
        allSnakes.forEach(s => {
            if (!s.alive) return;
            // 檢查每一條蛇的頭是否撞到「其他蛇」的身體
            allSnakes.forEach(other => {
                if (!other.alive) return;
                // 跳過檢查自己的頭撞自己的頭
                if (s === other) return; 

                // 檢查 s 的頭與 other 的歷史座標
                for (let i = 10; i < other.bodyLength * 6; i += 4) {
                    let part = other.history[i];
                    if (part) {
                        let dist = Math.hypot(s.x - part.x, s.y - part.y);
                        if (dist < SNAKE_SIZE * 1.5) {
                            s.alive = false; // 撞到的人死掉
                            if (s.isPlayer) document.getElementById('status').innerText = "💀 你撞車陣亡了！";
                        }
                    }
                }
            });
        });

        // 3. 吃食物
        foods.forEach((f, index) => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fillStyle = f.color; ctx.fill();
            
            if (player.alive && Math.hypot(player.x - f.x, player.y - f.y) < SNAKE_SIZE + f.size) {
                player.bodyLength += 0.2;
                foods.splice(index, 1); createFood();
                scoreDisplay.innerText = `長度: ${Math.floor(player.bodyLength)}`;
            }
        });

        // 4. 繪製所有蛇
        enemies.forEach(e => e.draw());
        player.draw();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
