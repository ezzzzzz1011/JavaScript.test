<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 迷你慢速版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #040404; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: rgba(0, 255, 100, 0.8); 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3 id="scoreDisplay">長度: 5.0</h3>
        <p style="font-size: 0.7em;">極短開場 | 慢速模式</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 核心修改：長度 5 & 速度 1.0 ---
    let snake = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        angle: 0,
        targetAngle: 0,
        baseSpeed: 1.0,   // 再次調慢，非常有節奏感
        boostSpeed: 3.0,  
        size: 6,         
        color: '#22ff00',
        boostColor: '#00ffff',
        history: [],      
        bodyLength: 5,    // 初始長度改為 5
        isBoosting: false
    };

    // 預填路徑
    for(let i=0; i<1000; i++) {
        snake.history.push({x: snake.x, y: snake.y});
    }

    let foods = [];
    for(let i=0; i<80; i++) { createFood(); }

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        ctx.fillStyle = '#040404';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫格線
        ctx.strokeStyle = '#0d0d0d';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.height, y); ctx.stroke();
        }

        // 加速邏輯
        let currentSpeed = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostSpeed : snake.baseSpeed;
        let currentColor = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostColor : snake.color;
        
        if (snake.isBoosting && snake.bodyLength > 3) {
            snake.bodyLength -= 0.01; // 因為速度慢，消耗也調到極低
            scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
        }

        // 轉向邏輯
        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);
        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        snake.angle += diff * 0.06; // 轉向變更慢，增加優雅弧度

        // 位置更新
        snake.x += Math.cos(snake.angle) * currentSpeed;
        snake.y += Math.sin(snake.angle) * currentSpeed;

        snake.history.unshift({x: snake.x, y: snake.y});
        if (snake.history.length > 3000) snake.history.pop();

        // 畫食物
        foods.forEach((f, index) => {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();

            let dist = Math.hypot(snake.x - f.x, snake.y - f.y);
            if (dist < snake.size + f.size) {
                snake.bodyLength += 0.3; 
                foods.splice(index, 1);
                createFood();
                scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
            }
        });

        // 畫身體
        for (let i = Math.floor(snake.bodyLength); i > 0; i--) {
            // 由於速度降到 1.0，座標點非常擁擠，間隔稍微調整到 10
            let index = i * 10; 
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, snake.size * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = (snake.isBoosting && snake.bodyLength > 3) ? 
                    `rgba(0, 255, 255, ${0.6 - i/snake.bodyLength})` : 
                    `rgba(34, 255, 0, ${0.6 - i/snake.bodyLength})`;
                ctx.fill();
            }
        }

        // 畫蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        ctx.beginPath();
        ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = currentColor;
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI * 2); ctx.arc(3, 2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
