<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 真實質感版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: rgba(0, 255, 100, 0.9); 
            pointer-events: none; 
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5</h2>
        <p style="font-size: 0.8em;">絲滑實體質感 | 慢速模式</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 核心參數：真正的小短蛇 ---
    let snake = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        angle: 0,
        targetAngle: 0,
        baseSpeed: 1.2,   // 慢速
        boostSpeed: 3.5,  
        size: 7,          // 稍微加大一點點，增加厚實感
        color: '#22ff00',
        boostColor: '#00ffff',
        history: [],      
        bodyLength: 5,    // 初始長度 5
        isBoosting: false
    };

    // 初始化極短的路徑，防止開場撐長
    for(let i=0; i<100; i++) {
        snake.history.push({x: snake.x, y: snake.y});
    }

    let foods = [];
    for(let i=0; i<80; i++) { createFood(); }

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫背景格線
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.height, y); ctx.stroke();
        }

        let currentSpeed = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostSpeed : snake.baseSpeed;
        let currentColor = (snake.isBoosting && snake.bodyLength > 3) ? snake.boostColor : snake.color;
        
        if (snake.isBoosting && snake.bodyLength > 3) {
            snake.bodyLength -= 0.02;
            scoreDisplay.innerText = `長度: ${Math.floor(snake.bodyLength)}`;
        }

        // 轉向
        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);
        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        snake.angle += diff * 0.08; 

        // 更新位置
        snake.x += Math.cos(snake.angle) * currentSpeed;
        snake.y += Math.sin(snake.angle) * currentSpeed;

        snake.history.unshift({x: snake.x, y: snake.y});
        if (snake.history.length > 2000) snake.history.pop();

        // 畫食物
        foods.forEach((f, index) => {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();

            let dist = Math.hypot(snake.x - f.x, snake.y - f.y);
            if (dist < snake.size + f.size) {
                snake.bodyLength += 0.2; // 成長極慢
                foods.splice(index, 1);
                createFood();
                scoreDisplay.innerText = `長度: ${Math.floor(snake.bodyLength)}`;
            }
        });

        // --- 核心修改：.io 質感身體 ---
        for (let i = Math.floor(snake.bodyLength * 2); i > 0; i--) {
            // 間距縮小到 3，讓圓圈高度重疊變成「一條實心的肉」
            let index = i * 3; 
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                // 身體半徑隨長度微縮
                let r = snake.size * 0.9;
                ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
                
                // 漸層色：加速時變青色，平時綠色
                ctx.fillStyle = snake.isBoosting ? '#00e5ff' : '#1fb500';
                
                // 加一點深色描邊增加立體感
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.5;
                
                ctx.fill();
                ctx.stroke();
            }
        }

        // 畫蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        ctx.beginPath();
        ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = currentColor;
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 經典大眼睛
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(4, -3, 3.5, 0, Math.PI * 2); ctx.arc(4, 3, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(5, -3, 1.8, 0, Math.PI * 2); ctx.arc(5, 3, 1.8, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
