<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 加速終極修復版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; touch-action: none; } /* 增加觸控相容 */
        #ui { position: absolute; top: 20px; left: 20px; color: #00FF41; pointer-events: none; z-index: 10; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100;
        }
        button {
            padding: 15px 45px; font-size: 22px; cursor: pointer;
            background: #22ff00; border: none; border-radius: 50px; font-weight: bold;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5.0</h2>
        <p>🚀 狀態：<span id="boostStatus">正常游動</span> (按住左鍵加速至 1.8)</p>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; font-size: 48px;">💥 撞車陣亡！</h1>
        <button id="restartBtn">重新復活</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const boostStatus = document.getElementById('boostStatus');
    const overlay = document.getElementById('overlay');
    const restartBtn = document.getElementById('restartBtn');

    const WORLD_SIZE = 2000;
    const SNAKE_SIZE = 8;
    const MAX_ENEMIES = 10; 
    let snakes = [];
    let foods = [];
    let gameActive = false;
    let isMouseDown = false; // 全域滑鼠狀態

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Snake {
        constructor(x, y, color, isPlayer = false) {
            this.x = x; this.y = y;
            this.color = color;
            this.isPlayer = isPlayer;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
            this.bodyLength = 5.0;
            this.history = [];
            this.alive = true;
            this.baseSpeed = 1.2;
            this.boostSpeed = 1.8;
            this.isBoosting = false;
            for(let i=0; i<800; i++) this.history.push({x: this.x, y: this.y});
        }

        update(mouse) {
            if (!this.alive) return;

            // 玩家加速邏輯：直接讀取全域按鍵狀態
            if (this.isPlayer) {
                this.isBoosting = isMouseDown && this.bodyLength > 3;
                boostStatus.innerText = this.isBoosting ? "🔥 噴射加速中！" : "正常游動";
                boostStatus.style.color = this.isBoosting ? "#00ffff" : "#00FF41";
                
                if (this.isBoosting) {
                    this.bodyLength -= 0.015; // 加速消耗
                    scoreDisplay.innerText = `長度: ${this.bodyLength.toFixed(1)}`;
                }
                
                let dx = mouse.x - canvas.width / 2;
                let dy = mouse.y - canvas.height / 2;
                this.targetAngle = Math.atan2(dy, dx);
            } else {
                // AI 避障
                const margin = 250;
                if (this.x < margin || this.x > WORLD_SIZE - margin || this.y < margin || this.y > WORLD_SIZE - margin) {
                    this.targetAngle = Math.atan2(WORLD_SIZE/2 - this.y, WORLD_SIZE/2 - this.x);
                } else if (Math.random() < 0.02) {
                    this.targetAngle += (Math.random() - 0.5) * 2;
                }
            }

            let speed = this.isBoosting ? this.boostSpeed : this.baseSpeed;
            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.1;

            this.x += Math.cos(this.angle) * speed;
            this.y += Math.sin(this.angle) * speed;

            if (this.x <= 0 || this.x >= WORLD_SIZE || this.y <= 0 || this.y >= WORLD_SIZE) this.die();

            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 3000) this.history.pop();
        }

        die() {
            if (!this.alive) return;
            this.alive = false;
            for (let i = 0; i < this.bodyLength * 2; i++) {
                let pos = this.history[i * 6] || {x: this.x, y: this.y};
                foods.push({ x: pos.x + (Math.random()-0.5)*20, y: pos.y + (Math.random()-0.5)*20, size: 3, color: this.color });
            }
            if (this.isPlayer) { gameActive = false; overlay.style.display = 'flex'; }
        }

        draw() {
            if (!this.alive) return;
            let speed = this.isBoosting ? this.boostSpeed : this.baseSpeed;
            
            // 身體
            for (let i = Math.floor(this.bodyLength * 3); i > 0; i--) {
                let index = Math.floor(i * (4 / speed) * 2.8); 
                let pos = this.history[index];
                if (pos) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SNAKE_SIZE * 0.85, 0, Math.PI * 2);
                    ctx.fillStyle = (this.isPlayer && this.isBoosting) ? '#00e5ff' : this.color;
                    ctx.globalAlpha = 0.5;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
            // 頭
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            if (this.isPlayer && this.isBoosting) { ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff'; }
            ctx.beginPath(); ctx.arc(0, 0, SNAKE_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = (this.isPlayer && this.isBoosting) ? '#ffffff' : this.color; 
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(4, -3, 3, 0, Math.PI * 2); ctx.arc(4, 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI * 2); ctx.arc(5, 3, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function initGame() {
        overlay.style.display = 'none';
        snakes = []; foods = []; isMouseDown = false;
        snakes.push(new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#ff6666', true));
        for(let i=0; i<MAX_ENEMIES; i++) spawnEnemy();
        for(let i=0; i<150; i++) spawnRandomFood();
        gameActive = true;
    }

    function spawnEnemy() {
        const colors = ['#00CCFF', '#FFAA00', '#FF00FF', '#00FF88', '#ffffff'];
        snakes.push(new Snake(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[Math.floor(Math.random()*colors.length)]));
    }

    function spawnRandomFood() {
        foods.push({ x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, size: 2, color: `hsl(${Math.random()*360},100%,70%)` });
    }

    // --- 強化版事件監聽 ---
    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    
    // 使用 window 級別的監聽，確保百分之百抓到點擊
    window.addEventListener('mousedown', () => { isMouseDown = true; });
    window.addEventListener('mouseup', () => { isMouseDown = false; });
    // 增加觸控支援
    window.addEventListener('touchstart', () => { isMouseDown = true; });
    window.addEventListener('touchend', () => { isMouseDown = false; });

    restartBtn.addEventListener('click', initGame);

    function gameLoop() {
        if (!gameActive) { requestAnimationFrame(gameLoop); return; }
        let player = snakes.find(s => s.isPlayer);
        if (!player) return;

        let camX = canvas.width / 2 - player.x;
        let camY = canvas.height / 2 - player.y;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camX, camY);
        ctx.fillStyle = '#080808'; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        if (snakes.filter(s => !s.isPlayer && s.alive).length < MAX_ENEMIES) spawnEnemy();

        snakes.forEach(s => {
            if (!s.alive) return;
            s.update(mouse);

            snakes.forEach(other => {
                if (!other.alive || s === other) return; 
                for (let i = 10; i < other.bodyLength * 12; i += 6) {
                    let part = other.history[i];
                    if (part && Math.hypot(s.x - part.x, s.y - part.y) < SNAKE_SIZE * 1.3) s.die();
                }
            });

            foods.forEach((f, i) => {
                if (Math.hypot(s.x - f.x, s.y - f.y) < SNAKE_SIZE + f.size) {
                    s.bodyLength += 0.15; foods.splice(i, 1); spawnRandomFood();
                    if(s.isPlayer) scoreDisplay.innerText = `長度: ${s.bodyLength.toFixed(1)}`;
                }
            });
            s.draw();
        });

        foods.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fillStyle = f.color; ctx.fill();
        });

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    initGame();
    gameLoop();
</script>
</body>
</html>
