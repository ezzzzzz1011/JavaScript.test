<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GitHub 連線暗棋 (P2P)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f0f0; }
        #lobby { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        #lobby input { padding: 5px; font-size: 16px; }
        #lobby button { padding: 5px 10px; font-size: 16px; cursor: pointer; }
        #game-info { margin: 10px 0; font-size: 20px; font-weight: bold; }
        
        /* 棋盤樣式 */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 2px;
            background-color: #8b4513;
            padding: 5px;
            border-radius: 5px;
            pointer-events: none; /* 連線前禁止點擊 */
            opacity: 0.5;
        }
        #board.active { pointer-events: auto; opacity: 1; }
        .cell {
            width: 60px; height: 60px;
            background-color: #deb887;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; font-weight: bold; cursor: pointer;
            border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            user-select: none;
        }
        .cell.hidden { background-color: #d2691e; color: transparent; }
        .cell.hidden::after { content: "？"; color: #fff; font-size: 24px; opacity: 0.5; }
        .cell.empty { background-color: transparent; box-shadow: none; cursor: default; }
        .cell.red { color: #d32f2f; }
        .cell.black { color: #1976d2; }
        .cell.selected { border: 3px solid #ffff00; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="lobby">
        <h3>P2P 連線大廳</h3>
        <p>你的連線代碼: <strong id="my-id" style="color: blue;">載入中...</strong></p>
        <hr>
        <input type="text" id="friend-id" placeholder="貼上朋友的代碼">
        <button onclick="connectToFriend()">加入遊戲</button>
    </div>

    <div id="game-info">等待連線中...</div>
    <div id="board"></div>

    <script>
        // 棋子定義
        const PIECES = [
            { name: '帥', color: 'red' }, { name: '將', color: 'black' },
            { name: '仕', color: 'red' }, { name: '仕', color: 'red' }, { name: '士', color: 'black' }, { name: '士', color: 'black' },
            { name: '相', color: 'red' }, { name: '相', color: 'red' }, { name: '象', color: 'black' }, { name: '象', color: 'black' },
            { name: '俥', color: 'red' }, { name: '俥', color: 'red' }, { name: '車', color: 'black' }, { name: '車', color: 'black' },
            { name: '傌', color: 'red' }, { name: '傌', color: 'red' }, { name: '馬', color: 'black' }, { name: '馬', color: 'black' },
            { name: '炮', color: 'red' }, { name: '炮', color: 'red' }, { name: '包', color: 'black' }, { name: '包', color: 'black' },
            { name: '兵', color: 'red' }, { name: '兵', color: 'red' }, { name: '兵', color: 'red' }, { name: '兵', color: 'red' }, { name: '兵', color: 'red' },
            { name: '卒', color: 'black' }, { name: '卒', color: 'black' }, { name: '卒', color: 'black' }, { name: '卒', color: 'black' }, { name: '卒', color: 'black' }
        ];

        let boardData = [];
        let myRole = null; // 'host' (玩家1) 或 'guest' (玩家2)
        let currentTurn = 'host';
        let selectedIndex = -1;
        let conn = null; // 連線實例

        // 初始化 PeerJS
        const peer = new Peer();
        
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 接收別人連線 (我是房主 Host)
        peer.on('connection', (connection) => {
            conn = connection;
            myRole = 'host';
            setupConnection();
            initGameAsHost(); // 房主負責洗牌
        });

        // 主動連線給別人 (我是客人 Guest)
        function connectToFriend() {
            const friendId = document.getElementById('friend-id').value;
            if (!friendId) return alert('請輸入代碼');
            conn = peer.connect(friendId);
            myRole = 'guest';
            setupConnection();
        }

        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('board').classList.add('active');
                updateInfo();
            });

            // 接收對手傳來的遊戲資料
            conn.on('data', (data) => {
                if (data.type === 'sync') {
                    boardData = data.board;
                    currentTurn = data.turn;
                    selectedIndex = -1;
                    renderBoard();
                    updateInfo();
                }
            });
        }

        // 房主負責洗牌並同步給客人
        function initGameAsHost() {
            let shuffled = [...PIECES].sort(() => Math.random() - 0.5);
            boardData = shuffled.map(p => ({ ...p, isOpen: false, isEmpty: false }));
            currentTurn = 'host';
            syncGame();
            renderBoard();
            updateInfo();
        }

        // 將當前狀態發送給對手
        function syncGame() {
            if (conn && conn.open) {
                conn.send({ type: 'sync', board: boardData, turn: currentTurn });
            }
        }

        function updateInfo() {
            const roleStr = myRole === 'host' ? '玩家 1' : '玩家 2';
            const turnStr = currentTurn === myRole ? '🟢 輪到你' : '🔴 等待對手';
            document.getElementById('game-info').innerText = `${roleStr} | ${turnStr}`;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            boardData.forEach((piece, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';

                if (piece.isEmpty) {
                    cell.classList.add('empty');
                } else if (!piece.isOpen) {
                    cell.classList.add('hidden');
                } else {
                    cell.classList.add(piece.color);
                    cell.innerText = piece.name;
                }

                if (index === selectedIndex) {
                    cell.classList.add('selected');
                }

                cell.onclick = () => handleCellClick(index);
                boardEl.appendChild(cell);
            });
        }

        function handleCellClick(index) {
            // 不是自己的回合不能動
            if (currentTurn !== myRole) return;

            const piece = boardData[index];

            // 1. 翻棋
            if (!piece.isEmpty && !piece.isOpen) {
                if (selectedIndex !== -1) {
                    selectedIndex = -1;
                    renderBoard();
                } else {
                    boardData[index].isOpen = true;
                    endTurn();
                }
                return;
            }

            // 2. 選棋子
            if (!piece.isEmpty && piece.isOpen) {
                selectedIndex = selectedIndex === index ? -1 : index;
                renderBoard();
                return;
            }

            // 3. 移動或吃子 (這裡為簡化版，實作需加入嚴格規則)
            if (selectedIndex !== -1) {
                const isAdjacent = 
                    (index === selectedIndex - 1 && selectedIndex % 8 !== 0) ||
                    (index === selectedIndex + 1 && index % 8 !== 0) ||
                    (index === selectedIndex - 8) ||
                    (index === selectedIndex + 8);
                
                if (isAdjacent) {
                    boardData[index] = boardData[selectedIndex];
                    boardData[selectedIndex] = { isEmpty: true };
                    endTurn();
                }
            }
        }

        function endTurn() {
            currentTurn = currentTurn === 'host' ? 'guest' : 'host';
            selectedIndex = -1;
            syncGame(); // 傳送最新狀態給對手
            renderBoard();
            updateInfo();
        }
    </script>
</body>
</html>
