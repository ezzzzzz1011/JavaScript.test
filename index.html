<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗棋 Online - 穩定聯機版</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; font-family: sans-serif; height: 100vh; justify-content: center; color: white; }
        #lobby { background: #333; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #3498db; width: 320px; }
        .status-bar { font-size: 18px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        canvas { background-color: #dcb35c; box-shadow: 0 0 25px rgba(0,0,0,0.6); cursor: pointer; border: 4px solid #5d4037; border-radius: 8px; display: none; }
        button { padding: 12px 20px; cursor: pointer; background: #3498db; border: none; color: white; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; font-size: 16px; }
        #net-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4757; margin-right: 10px; }
        .room-info { font-size: 12px; color: #3498db; margin-top: 15px; background: #000; padding: 12px; border-radius: 8px; word-break: break-all; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="lobby">
    <h2 style="margin:0 0 20px 0;">♟️ 暗棋對戰室</h2>
    <div id="init-ui">
        <button onclick="createRoom()" style="background: #e67e22;">建立新房間 (房主)</button>
    </div>
    <div id="wait-ui" style="display:none;">
        <div class="status-bar"><div id="net-dot"></div><span id="lobby-msg">初始化連線...</span></div>
        <p id="instruction" style="font-size: 13px;">請複製下方連結給朋友：</p>
        <div class="room-info" id="room-link" onclick="copyLink()" style="cursor:pointer;">取得連結中...</div>
    </div>
</div>

<div id="game-ui" style="display: none; text-align: center;">
    <div class="status-bar"><div style="width:12px; height:12px; border-radius:50%; background:lime; margin-right:10px;"></div><span id="statusText">連線成功</span></div>
    <div id="turnDisplay" style="margin-bottom: 10px; font-size:14px; color: #ddd;">身分：未定</div>
    <canvas id="chessBoard"></canvas>
    <button onclick="location.href=location.pathname" style="width:auto; background:#555; margin-top:20px; font-size:14px; padding:8px 15px;">回大廳</button>
</div>

<script>
    const canvas = document.getElementById('chessBoard');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const turnDisplay = document.getElementById('turnDisplay');
    const lobbyMsg = document.getElementById('lobby-msg');
    const netDot = document.getElementById('net-dot');
    
    const COLS = 4, ROWS = 8, PADDING = 15;
    let cellSize, board = [], myColor = 0, turn = 1, peer, conn, isHost = false;

    // 1. 取得房間參數
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');

    if (roomId) {
        document.getElementById('init-ui').style.display = 'none';
        document.getElementById('wait-ui').style.display = 'block';
        document.getElementById('instruction').innerText = "正在進入房間，請稍候...";
        document.getElementById('room-link').innerText = "房間代碼: " + roomId;
        initPeer(false); // 作為加入者
    }

    function createRoom() {
        const randId = 'room-' + Math.random().toString(36).substr(2, 7);
        window.location.href = window.location.pathname + '?room=' + randId;
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("連結已複製！傳給朋友即可對戰。");
    }

    // 2. 初始化 PeerJS
    function initPeer(asHost) {
        // 如果是房主，ID 設為 roomId；如果是加入者，隨機產生 ID
        const peerId = (roomId && asHost) ? roomId : null;
        peer = new Peer(peerId, { debug: 1 });

        peer.on('open', (id) => {
            console.log("My peer ID:", id);
            netDot.style.background = "#2ecc71";
            
            if (roomId && id === roomId) {
                isHost = true;
                lobbyMsg.innerText = "連線就緒，等待對手...";
                document.getElementById('instruction').innerText = "請複製網址給朋友：";
                document.getElementById('room-link').innerText = window.location.href;
            } else if (roomId) {
                // 如果我是加入者，嘗試連線到 roomId
                lobbyMsg.innerText = "嘗試連線到房主...";
                setTimeout(() => {
                    conn = peer.connect(roomId, { reliable: true });
                    bindConnEvents();
                }, 1000);
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            isHost = true;
            initBoard(); 
            bindConnEvents();
        });

        peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                // 如果 ID 被佔用，代表房主已經在那了，我應該改當加入者
                initPeer(false);
            } else {
                lobbyMsg.innerText = "連線出錯，請重新整理";
                console.error(err);
            }
        });
    }

    function bindConnEvents() {
        conn.on('open', () => {
            showGameUI();
            if(!isHost) sendData({ type: 'READY' });
        });

        conn.on('data', (data) => {
            if(data.type === 'READY' && isHost) {
                sendData({ type: 'SYNC', board: board, turn: turn });
            } else if(data.type === 'SYNC') {
                board = data.board;
                turn = data.turn;
                statusText.innerText = "對戰開始";
                draw(); updateUI();
            } else if(data.type === 'ACTION') {
                applyAction(data);
            }
        });

        conn.on('close', () => { alert("對手已離開"); location.reload(); });
    }

    function sendData(d) { if(conn && conn.open) conn.send(d); }

    function showGameUI() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        const sw = Math.min(window.innerWidth * 0.9, 320);
        canvas.style.display = "block";
        canvas.width = sw; canvas.height = sw*2;
        cellSize = (sw-PADDING*2)/COLS;
        draw();
    }

    // --- 遊戲邏輯 ---
    function initBoard() {
        const pieces = [
            {n:'帥',l:7,c:1},{n:'仕',l:6,c:1,t:2},{n:'相',l:5,c:1,t:2},{n:'車',l:4,c:1,t:2},{n:'傌',l:3,c:1,t:2},{n:'炮',l:2,c:1,t:2},{n:'兵',l:1,c:1,t:5},
            {n:'將',l:7,c:2},{n:'士',l:6,c:2,t:2},{n:'象',l:5,c:2,t:2},{n:'車',l:4,c:2,t:2},{n:'馬',l:3,c:2,t:2},{n:'包',l:2,c:2,t:2},{n:'卒',l:1,c:2,t:5}
        ];
        let pool = [];
        pieces.forEach(p => { for(let i=0; i<(p.t||1); i++) pool.push({name:p.n, level:p.l, color:p.c, revealed:false}); });
        pool.sort(() => Math.random() - 0.5);
        board = [];
        for(let r=0; r<ROWS; r++) { board[r] = []; for(let c=0; c<COLS; c++) board[r][c] = pool.shift(); }
    }

    function applyAction(d) {
        const { r1, c1, r2, c2, flip, colorSet } = d;
        if(colorSet) myColor = (colorSet === 1) ? 2 : 1;
        if(flip) board[r2][c2].revealed = true;
        else { board[r2][c2] = board[r1][c1]; board[r1][c1] = null; }
        turn = (turn === 1) ? 2 : 1;
        updateUI(); draw(); checkWin();
    }

    function draw() {
        if(!board.length) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#5d4037";
        for(let r=0; r<=ROWS; r++) { ctx.beginPath(); ctx.moveTo(PADDING, PADDING+r*cellSize); ctx.lineTo(canvas.width-PADDING, PADDING+r*cellSize); ctx.stroke(); }
        for(let c=0; c<=COLS; c++) { ctx.beginPath(); ctx.moveTo(PADDING+c*cellSize, PADDING); ctx.lineTo(PADDING+c*cellSize, canvas.height-PADDING); ctx.stroke(); }
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                const p = board[r][c]; if(!p) continue;
                const x = PADDING+c*cellSize+cellSize/2, y = PADDING+r*cellSize+cellSize/2;
                if(selected && selected.r === r && selected.c === c) { ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.fillRect(PADDING+c*cellSize, PADDING+r*cellSize, cellSize, cellSize); }
                ctx.beginPath(); ctx.arc(x,y,cellSize*0.42,0,Math.PI*2);
                ctx.fillStyle = p.revealed ? "#fdf5e6" : "#a0522d";
                ctx.fill(); ctx.stroke();
                if(p.revealed) {
                    ctx.fillStyle = p.color===1 ? "#b22222" : "#2f4f4f";
                    ctx.font = `bold ${cellSize*0.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
                    ctx.fillText(p.name, x, y);
                }
            }
        }
    }

    canvas.addEventListener('mousedown', e => {
        if(turn !== myColor && myColor !== 0) return;
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((e.clientX-rect.left-PADDING)/cellSize), r = Math.floor((e.clientY-rect.top-PADDING)/cellSize);
        if(r<0||r>=ROWS||c<0||c>=COLS) return;
        const clicked = board[r][c];
        if(clicked && !clicked.revealed) {
            let cs = 0; clicked.revealed = true;
            if(myColor === 0) { myColor = clicked.color; cs = myColor; }
            const act = { type: 'ACTION', r2:r, c2:c, flip:true, colorSet:cs };
            sendData(act); applyAction(act); return;
        }
        if(selected) {
            if(canMove(selected.r, selected.c, r, c)) {
                const act = { type: 'ACTION', r1:selected.r, c1:selected.c, r2:r, c2:c, flip:false };
                sendData(act); applyAction(act); selected = null;
            } else { selected = (clicked && clicked.revealed && clicked.color === myColor) ? {r,c} : null; draw(); }
        } else if(clicked && clicked.revealed && clicked.color === myColor) { selected = {r,c}; draw(); }
    });

    function canMove(r1,c1,r2,c2) {
        const p1 = board[r1][c1], p2 = board[r2][c2], dist = Math.abs(r1-r2)+Math.abs(c1-c2);
        if(!p1) return false;
        if(p1.name==='炮'||p1.name==='包') {
            if(p2) {
                if(r1!==r2 && c1!==c2) return false;
                let cnt = 0;
                if(r1===r2) for(let i=Math.min(c1,c2)+1; i<Math.max(c1,c2); i++) if(board[r1][i]) cnt++;
                else for(let i=Math.min(r1,r2)+1; i<Math.max(r1,r2); i++) if(board[i][c1]) cnt++;
                return cnt===1 && p1.color!==p2.color && p2.revealed;
            }
        }
        if(dist!==1) return false;
        if(!p2) return true;
        if(p1.color===p2.color || !p2.revealed) return false;
        if(p1.level===1 && p2.level===7) return true;
        if(p1.level===7 && p2.level===1) return false;
        return p1.level>=p2.level;
    }

    function updateUI() {
        const isMyTurn = (myColor === 0 || turn === myColor);
        statusText.innerText = isMyTurn ? "你的回合" : "對手回合";
        turnDisplay.innerText = "身分：" + (myColor === 0 ? "未定" : (myColor === 1 ? "紅方" : "黑方"));
    }

    function checkWin() {
        let r=0, b=0; board.forEach(row => row.forEach(p => { if(p){ if(p.color===1) r++; else b++; }}));
        if(r===0 || b===0) { alert((r===0 ? "黑方" : "紅方") + " 獲勝！"); location.href = location.pathname; }
    }

    // 如果沒有 roomId，代表是剛進大廳，不啟動 Peer
</script>
</body>
</html>
