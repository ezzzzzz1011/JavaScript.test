<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典五子棋 - 模式切換版</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; background-color: #2c3e50; font-family: sans-serif; 
            height: 100vh; justify-content: center;
        }
        #ui { color: white; margin-bottom: 20px; text-align: center; }
        .btn-group { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        canvas { 
            background-color: #e3bc82; 
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            cursor: pointer;
            border-radius: 4px;
            max-width: 95vw;
            max-height: 70vh;
        }
        .status { font-size: 22px; font-weight: bold; margin-bottom: 5px; height: 30px; }
        .mode-info { font-size: 14px; color: #bdc3c7; margin-bottom: 10px; }
        button {
            padding: 10px 20px; font-size: 14px; cursor: pointer;
            background: #34495e; border: 1px solid #7f8c8d; color: white; border-radius: 5px;
            transition: 0.2s;
        }
        button.active { background: #27ae60; border-color: #2ecc71; }
        button:hover { background: #1abc9c; }
    </style>
</head>
<body>

<div id="ui">
    <div class="status" id="statusDisplay">準備開局</div>
    <div class="mode-info" id="modeDisplay">模式：未選擇</div>
    <div class="btn-group">
        <button id="pvcBtn" onclick="setMode('pvc')">跟電腦 PK</button>
        <button id="pvpBtn" onclick="setMode('pvp')">跟朋友玩</button>
        <button onclick="resetGame()" style="background: #c0392b;">清空重來</button>
    </div>
</div>

<canvas id="goBoard"></canvas>

<script>
    const canvas = document.getElementById('goBoard');
    const ctx = canvas.getContext('2d');
    const statusDisplay = document.getElementById('statusDisplay');
    const modeDisplay = document.getElementById('modeDisplay');

    const GRID_COUNT = 15;
    const PADDING = 30;
    let cellSize;
    let board = [];
    let currentPlayer = 1; // 1:黑, 2:白
    let gameOver = false;
    let gameMode = 'pvp'; // 'pvp' 或 'pvc'

    function init() {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.7;
        canvas.width = canvas.height = size;
        cellSize = (canvas.width - PADDING * 2) / (GRID_COUNT - 1);
        setMode('pvp'); // 預設跟朋友玩
    }

    function setMode(mode) {
        gameMode = mode;
        document.getElementById('pvcBtn').className = mode === 'pvc' ? 'active' : '';
        document.getElementById('pvpBtn').className = mode === 'pvp' ? 'active' : '';
        modeDisplay.innerText = mode === 'pvc' ? "模式：單人 vs 電腦" : "模式：雙人對戰";
        resetGame();
    }

    function resetGame() {
        board = Array.from({ length: GRID_COUNT }, () => Array(GRID_COUNT).fill(0));
        currentPlayer = 1;
        gameOver = false;
        statusDisplay.innerText = "輪到：黑子 (先手)";
        statusDisplay.style.color = "black";
        drawBoard();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.strokeStyle = "#444";
        for (let i = 0; i < GRID_COUNT; i++) {
            ctx.moveTo(PADDING + i * cellSize, PADDING);
            ctx.lineTo(PADDING + i * cellSize, canvas.height - PADDING);
            ctx.moveTo(PADDING, PADDING + i * cellSize);
            ctx.lineTo(canvas.width - PADDING, PADDING + i * cellSize);
        }
        ctx.stroke();

        for (let r = 0; r < GRID_COUNT; r++) {
            for (let c = 0; c < GRID_COUNT; c++) {
                if (board[r][c] !== 0) {
                    const x = PADDING + r * cellSize;
                    const y = PADDING + c * cellSize;
                    drawStone(x, y, board[r][c]);
                }
            }
        }
    }

    function drawStone(x, y, type) {
        const color = type === 1 ? "black" : "white";
        const grad = ctx.createRadialGradient(x-2, y-2, 1, x, y, cellSize/2.2);
        if (type === 1) {
            grad.addColorStop(0, "#555"); grad.addColorStop(1, "#000");
        } else {
            grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#bbb");
        }
        ctx.beginPath();
        ctx.arc(x, y, cellSize/2.2, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 3; ctx.shadowColor = "rgba(0,0,0,0.3)";
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    canvas.addEventListener('mousedown', (e) => {
        if (gameOver || (gameMode === 'pvc' && currentPlayer === 2)) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const r = Math.round((x - PADDING) / cellSize);
        const c = Math.round((y - PADDING) / cellSize);

        if (r >= 0 && r < GRID_COUNT && c >= 0 && c < GRID_COUNT && board[r][c] === 0) {
            makeMove(r, c);
            
            // 如果是電腦模式且遊戲沒結束，換電腦下
            if (gameMode === 'pvc' && !gameOver) {
                statusDisplay.innerText = "電腦思考中...";
                setTimeout(aiMove, 500); // 延遲一下讓感覺更真實
            }
        }
    });

    function makeMove(r, c) {
        board[r][c] = currentPlayer;
        drawBoard();
        if (checkWin(r, c)) {
            statusDisplay.innerText = `${currentPlayer === 1 ? "黑子" : "白子"} 獲勝！`;
            gameOver = true;
            return;
        }
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        statusDisplay.innerText = `輪到：${currentPlayer === 1 ? "黑子" : "白子"}`;
    }

    function aiMove() {
        if (gameOver) return;
        // 基礎 AI：找所有空格，隨機選一個
        let emptySpots = [];
        for (let r = 0; r < GRID_COUNT; r++) {
            for (let c = 0; c < GRID_COUNT; c++) {
                if (board[r][c] === 0) emptySpots.push({r, c});
            }
        }
        if (emptySpots.length > 0) {
            const spot = emptySpots[Math.floor(Math.random() * emptySpots.length)];
            makeMove(spot.r, spot.c);
        }
    }

    function checkWin(r, c) {
        const type = board[r][c];
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (let [dr, dc] of dirs) {
            let count = 1;
            let nr = r + dr, nc = c + dc;
            while(nr>=0 && nr<GRID_COUNT && nc>=0 && nc<GRID_COUNT && board[nr][nc] === type) { count++; nr+=dr; nc+=dc; }
            nr = r - dr; nc = c - dc;
            while(nr>=0 && nr<GRID_COUNT && nc>=0 && nc<GRID_COUNT && board[nr][nc] === type) { count++; nr-=dr; nc-=dc; }
            if (count >= 5) return true;
        }
        return false;
    }

    window.onload = init;
</script>
</body>
</html>
