<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 職業高手 AI</title>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; font-family: sans-serif; height: 100vh; justify-content: center; color: white; }
        #menu { margin-bottom: 20px; text-align: center; }
        .status { font-size: 24px; margin-bottom: 10px; color: #2ecc71; font-weight: bold; height: 35px; }
        .btn-group { display: flex; gap: 15px; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-pc { background-color: #e67e22; color: white; }
        .btn-friend { background-color: #3498db; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button.active { outline: 4px solid white; box-shadow: 0 0 15px white; }
        canvas { background-color: #dcb35c; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: pointer; border: 2px solid #5d4037; }
    </style>
</head>
<body>

<div id="menu">
    <div id="statusDisplay" class="status">挑戰職業 AI</div>
    <div class="btn-group">
        <button id="pvcBtn" class="btn-pc" onclick="setMode('pvc')">職業電腦</button>
        <button id="pvpBtn" class="btn-friend" onclick="setMode('pvp')">雙人對戰</button>
        <button class="btn-reset" onclick="resetGame()">清空</button>
    </div>
</div>

<canvas id="goBoard"></canvas>

<script>
    const canvas = document.getElementById('goBoard');
    const ctx = canvas.getContext('2d');
    const statusDisplay = document.getElementById('statusDisplay');

    const GRID_COUNT = 15;
    const PADDING = 30;
    let cellSize, board, currentPlayer, gameOver, gameMode;

    // 職業級權重表
    const P_SCORE = {
        FIVE: 100000,
        ALIVE_FOUR: 10000,
        DEAD_FOUR: 1000,
        ALIVE_THREE: 1000,
        DEAD_THREE: 100,
        ALIVE_TWO: 100,
        DEAD_TWO: 10,
    };

    function init() {
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.75;
        canvas.width = canvas.height = size;
        cellSize = (canvas.width - PADDING * 2) / (GRID_COUNT - 1);
        setMode('pvc');
    }

    function setMode(mode) {
        gameMode = mode;
        document.getElementById('pvcBtn').classList.toggle('active', mode === 'pvc');
        document.getElementById('pvpBtn').classList.toggle('active', mode === 'pvp');
        resetGame();
    }

    function resetGame() {
        board = Array.from({ length: GRID_COUNT }, () => Array(GRID_COUNT).fill(0));
        currentPlayer = 1;
        gameOver = false;
        statusDisplay.innerText = "你是黑子，請落子";
        drawBoard();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#5d4037";
        for (let i = 0; i < GRID_COUNT; i++) {
            ctx.beginPath();
            ctx.moveTo(PADDING + i * cellSize, PADDING);
            ctx.lineTo(PADDING + i * cellSize, canvas.height - PADDING);
            ctx.moveTo(PADDING, PADDING + i * cellSize);
            ctx.lineTo(canvas.width - PADDING, PADDING + i * cellSize);
            ctx.stroke();
        }
        for (let r = 0; r < GRID_COUNT; r++) {
            for (let c = 0; c < GRID_COUNT; c++) {
                if (board[r][c] !== 0) drawStone(r, c, board[r][c]);
            }
        }
    }

    function drawStone(r, c, type) {
        const x = PADDING + r * cellSize;
        const y = PADDING + c * cellSize;
        ctx.beginPath();
        ctx.arc(x, y, cellSize * 0.43, 0, Math.PI * 2);
        ctx.fillStyle = type === 1 ? "#000" : "#fff";
        ctx.shadowBlur = 4; ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    canvas.addEventListener('mousedown', (e) => {
        if (gameOver || (gameMode === 'pvc' && currentPlayer === 2)) return;
        const rect = canvas.getBoundingClientRect();
        const r = Math.round((e.clientX - rect.left - PADDING) / cellSize);
        const c = Math.round((e.clientY - rect.top - PADDING) / cellSize);
        if (r >= 0 && r < GRID_COUNT && c >= 0 && c < GRID_COUNT && board[r][c] === 0) {
            placeStone(r, c);
            if (!gameOver && gameMode === 'pvc') setTimeout(proAiMove, 200);
        }
    });

    function placeStone(r, c) {
        board[r][c] = currentPlayer;
        drawBoard();
        if (checkWin(r, c, board)) {
            statusDisplay.innerText = (currentPlayer === 1 ? "黑子" : "白子") + " 勝利！";
            gameOver = true;
            return;
        }
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        statusDisplay.innerText = currentPlayer === 1 ? "你的回合" : "AI 計算中...";
    }

    // --- 🏆 職業 AI 核心邏輯 ---
    function proAiMove() {
        let bestScore = -Infinity;
        let moves = [];

        for (let r = 0; r < GRID_COUNT; r++) {
            for (let c = 0; c < GRID_COUNT; c++) {
                if (board[r][c] === 0) {
                    // 基礎分數加上中心距離分數
                    let distScore = (7 - Math.abs(7-r)) + (7 - Math.abs(7-c));
                    let attack = getScore(r, c, 2); // 電腦進攻
                    let defend = getScore(r, c, 1); // 玩家防守
                    
                    let total = attack * 1.2 + defend + distScore;
                    
                    if (total > bestScore) {
                        bestScore = total;
                        moves = [{r, c}];
                    } else if (total === bestScore) {
                        moves.push({r, c});
                    }
                }
            }
        }
        const pick = moves[Math.floor(Math.random() * moves.length)];
        placeStone(pick.r, pick.c);
    }

    function getScore(r, c, type) {
        let score = 0;
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (let [dr, dc] of dirs) {
            let line = "";
            for (let i = -5; i <= 5; i++) {
                let nr = r + dr * i, nc = c + dc * i;
                if (nr < 0 || nr >= GRID_COUNT || nc < 0 || nc >= GRID_COUNT) line += "X";
                else if (i === 0) line += type;
                else if (board[nr][nc] === 0) line += "0";
                else if (board[nr][nc] === type) line += type;
                else line += "X";
            }
            score += patternScore(line, type.toString());
        }
        return score;
    }

    function patternScore(line, t) {
        if (line.includes(t.repeat(5))) return P_SCORE.FIVE;
        if (line.includes("0" + t.repeat(4) + "0")) return P_SCORE.ALIVE_FOUR;
        if (line.includes(t.repeat(4) + "0") || line.includes("0" + t.repeat(4))) return P_SCORE.DEAD_FOUR;
        if (line.includes("0" + t.repeat(3) + "0")) return P_SCORE.ALIVE_THREE;
        if (line.includes("0" + t.repeat(2) + "0")) return P_SCORE.ALIVE_TWO;
        return 0;
    }

    function checkWin(r, c, b) {
        const t = b[r][c], dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (let [dr, dc] of dirs) {
            let count = 1;
            for(let i=1; i<5; i++){
                let nr=r+dr*i, nc=c+dc*i;
                if(nr>=0 && nr<GRID_COUNT && nc>=0 && nc<GRID_COUNT && b[nr][nc]===t) count++; else break;
            }
            for(let i=1; i<5; i++){
                let nr=r-dr*i, nc=c-dc*i;
                if(nr>=0 && nr<GRID_COUNT && nc>=0 && nc<GRID_COUNT && b[nr][nc]===t) count++; else break;
            }
            if (count >= 5) return true;
        }
        return false;
    }
    window.onload = init;
</script>
</body>
</html>
