<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典五子棋 - Gomoku</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            align-items: center; background-color: #2c3e50; font-family: sans-serif; 
            height: 100vh; justify-content: center;
        }
        #ui { color: white; margin-bottom: 20px; text-align: center; }
        canvas { 
            background-color: #e3bc82; /* 經典木質棋盤色 */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: crosshair;
            border-radius: 4px;
        }
        .status { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        button {
            padding: 10px 25px; font-size: 16px; cursor: pointer;
            background: #27ae60; border: none; color: white; border-radius: 5px;
            transition: 0.2s;
        }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div id="ui">
    <div class="status" id="statusDisplay">輪到：黑子</div>
    <button onclick="resetGame()">重新開局</button>
</div>

<canvas id="goBoard"></canvas>

<script>
    const canvas = document.getElementById('goBoard');
    const ctx = canvas.getContext('2d');
    const statusDisplay = document.getElementById('statusDisplay');

    const GRID_COUNT = 15; // 15x15 棋盤
    const PADDING = 30;    // 邊距
    let cellSize;
    let board = [];        // 0:空, 1:黑, 2:白
    let currentPlayer = 1; // 1:黑, 2:白
    let gameOver = false;

    function init() {
        // 設定棋盤大小
        const minDim = Math.min(window.innerWidth, window.innerHeight) * 0.8;
        canvas.width = canvas.height = minDim;
        cellSize = (canvas.width - PADDING * 2) / (GRID_COUNT - 1);
        resetGame();
    }

    function resetGame() {
        board = Array.from({ length: GRID_COUNT }, () => Array(GRID_COUNT).fill(0));
        currentPlayer = 1;
        gameOver = false;
        statusDisplay.innerText = "輪到：黑子";
        statusDisplay.style.color = "black";
        drawBoard();
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 畫格線
        ctx.beginPath();
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 1;
        for (let i = 0; i < GRID_COUNT; i++) {
            // 直線
            ctx.moveTo(PADDING + i * cellSize, PADDING);
            ctx.lineTo(PADDING + i * cellSize, canvas.height - PADDING);
            // 橫線
            ctx.moveTo(PADDING, PADDING + i * cellSize);
            ctx.lineTo(canvas.width - PADDING, PADDING + i * cellSize);
        }
        ctx.stroke();

        // 畫星位 (參考用的小黑點)
        [3, 7, 11].forEach(r => {
            [3, 7, 11].forEach(c => {
                drawCircle(PADDING + r * cellSize, PADDING + c * cellSize, 4, "#000");
            });
        });

        // 畫棋子
        for (let r = 0; r < GRID_COUNT; r++) {
            for (let c = 0; c < GRID_COUNT; c++) {
                if (board[r][c] !== 0) {
                    const x = PADDING + r * cellSize;
                    const y = PADDING + c * cellSize;
                    const color = board[r][c] === 1 ? "black" : "white";
                    
                    // 棋子立體感
                    const gradient = ctx.createRadialGradient(x-5, y-5, 2, x, y, cellSize/2.2);
                    if (color === "black") {
                        gradient.addColorStop(0, "#666");
                        gradient.addColorStop(1, "#000");
                    } else {
                        gradient.addColorStop(0, "#fff");
                        gradient.addColorStop(1, "#ccc");
                    }
                    
                    ctx.beginPath();
                    ctx.arc(x, y, cellSize/2.2, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }
    }

    function drawCircle(x, y, r, color) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    canvas.addEventListener('mousedown', (e) => {
        if (gameOver) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // 計算最近的交點
        const r = Math.round((x - PADDING) / cellSize);
        const c = Math.round((y - PADDING) / cellSize);

        // 檢查範圍與是否已有棋子
        if (r >= 0 && r < GRID_COUNT && c >= 0 && c < GRID_COUNT && board[r][c] === 0) {
            board[r][c] = currentPlayer;
            
            if (checkWin(r, c)) {
                drawBoard();
                statusDisplay.innerText = `${currentPlayer === 1 ? "黑子" : "白子"} 獲勝！`;
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            statusDisplay.innerText = `輪到：${currentPlayer === 1 ? "黑子" : "白子"}`;
            statusDisplay.style.color = currentPlayer === 1 ? "black" : "white";
            drawBoard();
        }
    });

    function checkWin(r, c) {
        const type = board[r][c];
        const directions = [
            [1, 0],  // 水平
            [0, 1],  // 垂直
            [1, 1],  // 正斜
            [1, -1]  // 反斜
        ];

        for (let [dr, dc] of directions) {
            let count = 1;
            // 正向檢查
            let nr = r + dr, nc = c + dc;
            while (nr >= 0 && nr < GRID_COUNT && nc >= 0 && nc < GRID_COUNT && board[nr][nc] === type) {
                count++; nr += dr; nc += dc;
            }
            // 反向檢查
            nr = r - dr; nc = c - dc;
            while (nr >= 0 && nr < GRID_COUNT && nc >= 0 && nc < GRID_COUNT && board[nr][nc] === type) {
                count++; nr -= dr; nc -= dc;
            }
            if (count >= 5) return true;
        }
        return false;
    }

    window.onload = init;
</script>

</body>
</html>
