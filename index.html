<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 遺產與復活修正版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00FF41; pointer-events: none; z-index: 10; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100;
        }
        button {
            padding: 15px 45px; font-size: 22px; cursor: pointer;
            background: #22ff00; border: none; border-radius: 50px; font-weight: bold;
            box-shadow: 0 0 20px rgba(34,255,0,0.4); pointer-events: auto;
        }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="scoreDisplay">長度: 5.0</h2>
        <p>規則：頭撞身體即死 | 死亡會掉落點點</p>
    </div>

    <div id="overlay">
        <h1 style="color:#ff4444; font-size: 48px; margin-bottom: 10px;">💥 撞車陣亡！</h1>
        <p id="finalStat" style="margin-bottom: 25px; font-size: 18px;"></p>
        <button id="restartBtn">重新復活</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overlay = document.getElementById('overlay');
    const restartBtn = document.getElementById('restartBtn');
    const finalStat = document.getElementById('finalStat');

    const WORLD_SIZE = 1800;
    const SNAKE_SIZE = 8;
    let snakes = [];
    let foods = [];
    let gameActive = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Snake {
        constructor(x, y, color, isPlayer = false) {
            this.x = x; this.y = y;
            this.color = color;
            this.isPlayer = isPlayer;
            this.angle = Math.random() * Math.PI * 2;
            this.targetAngle = this.angle;
            this.bodyLength = 5.0; // 每次出生固定長度
            this.history = [];
            this.alive = true;
            this.speed = 1.3;
            this.invincible = 60; // 1秒無敵時間

            for(let i=0; i<600; i++) this.history.push({x: this.x, y: this.y});
        }

        update(mouse) {
            if (!this.alive) return;
            if (this.invincible > 0) this.invincible--;

            if (this.isPlayer) {
                let dx = mouse.x - canvas.width / 2;
                let dy = mouse.y - canvas.height / 2;
                this.targetAngle = Math.atan2(dy, dx);
            } else {
                if (Math.random() < 0.02) this.targetAngle += (Math.random() - 0.5) * 2;
            }

            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * 0.1;

            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;

            if (this.x <= 0 || this.x >= WORLD_SIZE || this.y <= 0 || this.y >= WORLD_SIZE) this.die();

            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 2000) this.history.pop();
        }

        die() {
            if (!this.alive) return;
            this.alive = false;
            
            // --- 死亡噴食物機制 ---
            for (let i = 0; i < this.bodyLength * 2; i++) {
                let pos = this.history[i * 5] || {x: this.x, y: this.y};
                foods.push({
                    x: pos.x + (Math.random()-0.5)*10,
                    y: pos.y + (Math.random()-0.5)*10,
                    size: 3 + Math.random()*2,
                    color: this.color,
                    isLegacy: true // 標記為遺產，吃起來長比較快
                });
            }

            if (this.isPlayer) {
                gameActive = false;
                finalStat.innerText = `最終長度: ${this.bodyLength.toFixed(1)}`;
                overlay.style.display = 'flex';
            }
        }

        draw() {
            if (!this.alive) return;
            for (let i = Math.floor(this.bodyLength * 3); i > 0; i--) {
                let index = i * 6; 
                let pos = this.history[index];
                if (pos) {
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, SNAKE_SIZE * 0.85, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.5;
                    ctx.fill();
                    ctx.globalAlpha = 1.0;
                }
            }
            ctx.save();
            ctx.translate(this.x, this.y); ctx.rotate(this.angle);
            ctx.beginPath(); ctx.arc(0, 0, SNAKE_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(4, -3, 3, 0, Math.PI * 2); ctx.arc(4, 3, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(5, -3, 1.5, 0, Math.PI * 2); ctx.arc(5, 3, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function initGame() {
        console.log("遊戲初始化...");
        overlay.style.display = 'none';
        snakes = [];
        foods = [];
        // 初始玩家
        snakes.push(new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#ff6666', true));
        // 初始敵人
        let colors = ['#00CCFF', '#FFAA00', '#FF00FF', '#00FF88', '#ffffff'];
        for(let i=0; i<8; i++) {
            snakes.push(new Snake(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, colors[i%colors.length]));
        }
        // 基礎食物
        for(let i=0; i<150; i++) spawnRandomFood();
        
        scoreDisplay.innerText = "長度: 5.0";
        gameActive = true;
    }

    function spawnRandomFood() {
        foods.push({
            x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE,
            size: Math.random() * 2 + 1.5, color: `hsl(${Math.random()*360}, 100%, 70%)`,
            isLegacy: false
        });
    }

    let mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    restartBtn.addEventListener('click', initGame);

    function gameLoop() {
        if (!gameActive) {
            requestAnimationFrame(gameLoop);
            return;
        }

        let player = snakes.find(s => s.isPlayer);
        if (!player) return;

        let camX = canvas.width / 2 - player.x;
        let camY = canvas.height / 2 - player.y;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(camX, camY);

        // 背景
        ctx.fillStyle = '#080808'; ctx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
        for(let i=0; i<=WORLD_SIZE; i+=60) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD_SIZE,i); ctx.stroke();
        }
        ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 8; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

        // 更新與碰撞
        snakes.forEach(s => {
            if (!s.alive) return;
            s.update(mouse);

            // 碰撞判定
            snakes.forEach(other => {
                if (!other.alive) return;
                if (s === other && s.invincible > 0) return;
                let startIdx = (s === other) ? 50 : 10;
                for (let i = startIdx; i < other.bodyLength * 12; i += 5) {
                    let part = other.history[i];
                    if (part && Math.hypot(s.x - part.x, s.y - part.y) < SNAKE_SIZE * 1.3) {
                        s.die();
                    }
                }
            });

            // 吃食物
            foods.forEach((f, i) => {
                if (Math.hypot(s.x - f.x, s.y - f.y) < SNAKE_SIZE + f.size) {
                    s.bodyLength += f.isLegacy ? 0.4 : 0.15; // 遺產點長更快
                    foods.splice(i, 1);
                    if (!f.isLegacy) spawnRandomFood();
                    if(s.isPlayer) scoreDisplay.innerText = `長度: ${s.bodyLength.toFixed(1)}`;
                }
            });
            s.draw();
        });

        // 畫食物
        foods.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); 
            ctx.fillStyle = f.color;
            if(f.isLegacy) { ctx.shadowBlur = 10; ctx.shadowColor = f.color; }
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    initGame();
    gameLoop();
</script>
</body>
</html>
