<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗棋 Online v3.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; font-family: sans-serif; min-height: 100vh; justify-content: center; color: white; overflow-x: hidden; }
        #lobby { background: #333; padding: 30px; border-radius: 15px; text-align: center; border: 2px solid #3498db; width: 320px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 10px; color: #666; }
        .status-bar { font-size: 20px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        #game-container { display: flex; flex-direction: row; align-items: flex-start; gap: 15px; display: none; }
        .captured-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 1px solid #444; width: 70px; min-height: 380px; display: flex; flex-direction: column; gap: 5px; }
        .captured-box h4 { margin: 0 0 5px 0; font-size: 12px; color: #aaa; text-align: center; }
        .dead-piece { width: 32px; height: 32px; border-radius: 50%; background: #fdf5e6; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 0 auto; border: 2px solid #5d4037; font-size: 16px; }
        .dead-red { color: #b22222; } .dead-black { color: #2f4f4f; }

        canvas { background-color: #dcb35c; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; border: 4px solid #5d4037; border-radius: 8px; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #444; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #222; color: #fff; text-align: center; font-size: 16px; }
        button { padding: 12px 20px; cursor: pointer; background: #3498db; border: none; color: white; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 5px; font-size: 16px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        .id-box { background: #000; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed #3498db; cursor: pointer; font-size: 15px; color: #3498db; letter-spacing: 1px; word-break: break-all; }
        
        @media (max-width: 600px) {
            #game-container { flex-direction: column; align-items: center; }
            .captured-box { flex-direction: row; width: 90%; min-height: auto; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div id="lobby">
    <h2 style="margin:0 0 10px 0;">♟️ 暗棋對戰室</h2>
    <div id="main-ui">
        <div class="status-bar" style="color: #f1c40f;"><span id="lobby-msg">連線伺服器中...</span></div>
        <div class="id-box" onclick="copyMyId()"><span id="my-id-display">取得中...</span></div>
        <input type="text" id="input-id" placeholder="貼上對手的 ID">
        <button onclick="joinRoom()" style="background:#27ae60;">連線對手</button>
    </div>
    <div class="version-tag">v3.0</div>
</div>

<div id="game-container">
    <div class="captured-box" id="red-graveyard"><h4>紅方陣亡</h4></div>
    
    <div id="game-ui" style="text-align: center;">
        <div class="status-bar" id="statusText">等待同步中...</div>
        <div id="turnDisplay" style="margin-bottom: 10px; font-size:14px; color:#aaa;">身分：未定</div>
        <canvas id="chessBoard"></canvas>
        <button onclick="location.reload()" style="width:auto; background:#555; margin-top:15px; padding:8px 20px; font-size:14px;">結束遊戲</button>
    </div>

    <div class="captured-box" id="black-graveyard"><h4>黑方陣亡</h4></div>
</div>

<script>
    const canvas = document.getElementById('chessBoard');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('statusText');
    const turnDisplay = document.getElementById('turnDisplay');
    const myIdDisplay = document.getElementById('my-id-display');
    
    const COLS = 4, ROWS = 8, PADDING = 15;
    let cellSize, board = [], selected = null, myColor = 0, peer, conn, gameEnded = false;
    let capturedPieces = [];
    let syncInterval = null; 

    // --- 核心修正：嚴格角色與回合制 ---
    let myRole = 'NONE'; // 'HOST' 或是 'GUEST'
    let currentTurnRole = 'HOST'; // 永遠由房主先手翻第一張牌

    peer = new Peer({ debug: 1 }); 
    
    peer.on('open', id => { 
        myIdDisplay.innerText = id; 
        document.getElementById('lobby-msg').innerText = "✅ 伺服器就緒 (你是房主)"; 
        myRole = 'HOST';
        initBoard();   
    });

    peer.on('connection', c => { 
        if(conn) return; // 防止重複連線
        conn = c; 
        bindEvents(); 
    });

    function copyMyId() { 
        navigator.clipboard.writeText(myIdDisplay.innerText); 
        alert("ID 已複製！傳給朋友吧。"); 
    }

    function joinRoom() { 
        const tid = document.getElementById('input-id').value.trim(); 
        if(!tid) return; 
        myRole = 'GUEST'; 
        conn = peer.connect(tid, { reliable: true }); 
        bindEvents(); 
    }

    function bindEvents() {
        conn.on('open', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            resize();
            
            if(myRole === 'GUEST') {
                // 客戶端每0.5秒索取一次棋盤，確保絕不漏接
                syncInterval = setInterval(() => { sendData({ type: 'REQ_SYNC' }); }, 500);
            }
        });

        conn.on('data', (data) => {
            if(data.type === 'REQ_SYNC' && myRole === 'HOST') {
                sendData({ type: 'FULL_SYNC', board: board, turnRole: currentTurnRole, captured: capturedPieces, colorInfo: myColor });
            } 
            else if(data.type === 'FULL_SYNC' && myRole === 'GUEST') {
                if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
                board = data.board; 
                currentTurnRole = data.turnRole; 
                capturedPieces = data.captured || [];
                if (data.colorInfo !== 0) myColor = (data.colorInfo === 1) ? 2 : 1;
                updateUI(); draw(); updateGraveyard();
            } 
            else if(data.type === 'ACTION') {
                handleAction(data);
            }
        });

        conn.on('close', () => { 
            if(!gameEnded){ 
                gameEnded = true; 
                statusText.innerText = "🏆 對手斷線，你贏了！"; 
                statusText.style.color = "#2ecc71";
                alert("對方已離開遊戲！"); 
            }
        });
    }

    function handleAction(data) {
        const { r1, c1, r2, c2, flip, colorSet } = data;
        
        if (flip) {
            board[r2][c2].revealed = true;
            if (colorSet && myColor === 0) myColor = (colorSet === 1) ? 2 : 1;
        } else {
            if (board[r2][c2]) capturedPieces.push(board[r2][c2]);
            board[r2][c2] = board[r1][c1]; 
            board[r1][c1] = null;
        }
        
        // 交換回合並清空殘影
        currentTurnRole = (currentTurnRole === 'HOST') ? 'GUEST' : 'HOST';
        selected = null; 
        
        updateUI(); draw(); updateGraveyard(); checkWin();
    }

    function sendData(d) { if(conn && conn.open) conn.send(d); }
    
    function resize() {
        const sw = Math.min(window.innerWidth * 0.75, 320);
        canvas.width = sw; canvas.height = sw*2;
        cellSize = (sw-PADDING*2)/COLS;
        draw();
    }

    function initBoard() {
        // 更正為標準的台灣暗棋字體 (俥, 傌)
        const pConf = [
            {n:'帥',l:7,c:1},{n:'仕',l:6,c:1,t:2},{n:'相',l:5,c:1,t:2},{n:'俥',l:4,c:1,t:2},{n:'傌',l:3,c:1,t:2},{n:'炮',l:2,c:1,t:2},{n:'兵',l:1,c:1,t:5},
            {n:'將',l:7,c:2},{n:'士',l:6,c:2,t:2},{n:'象',l:5,c:2,t:2},{n:'車',l:4,c:2,t:2},{n:'馬',l:3,c:2,t:2},{n:'包',l:2,c:2,t:2},{n:'卒',l:1,c:2,t:5}
        ];
        let pool = [];
        pConf.forEach(p => { for(let i=0; i<(p.t||1); i++) pool.push({name:p.n, level:p.l, color:p.c, revealed:false}); });
        pool.sort(() => Math.random() - 0.5);
        board = [];
        for(let r=0; r<ROWS; r++) { board[r] = []; for(let c=0; c<COLS; c++) board[r][c] = pool.shift(); }
    }

    function updateGraveyard() {
        document.getElementById('red-graveyard').innerHTML = "<h4>紅方陣亡</h4>";
        document.getElementById('black-graveyard').innerHTML = "<h4>黑方陣亡</h4>";
        capturedPieces.sort((a,b) => b.level - a.level).forEach(p => {
            const el = document.createElement('div');
            el.className = `dead-piece ${p.color === 1 ? 'dead-red' : 'dead-black'}`;
            el.innerText = p.name;
            if(p.color === 1) document.getElementById('red-graveyard').appendChild(el);
            else document.getElementById('black-graveyard').appendChild(el);
        });
    }

    canvas.addEventListener('mousedown', e => {
        // 【最嚴格的防線】：不是你的回合，滑鼠按斷了也沒用！
        if(gameEnded || myRole !== currentTurnRole) return;
        
        const rect = canvas.getBoundingClientRect();
        const c = Math.floor((e.clientX-rect.left-PADDING)/cellSize), r = Math.floor((e.clientY-rect.top-PADDING)/cellSize);
        if(r<0||r>=ROWS||c<0||c>=COLS) return;
        const clicked = board[r][c];

        // 翻牌動作
        if(clicked && !clicked.revealed) {
            let cs = 0; 
            clicked.revealed = true;
            if(myColor === 0) { myColor = clicked.color; cs = myColor; }
            
            // 本地直接強制換手，防止連點
            currentTurnRole = (currentTurnRole === 'HOST') ? 'GUEST' : 'HOST';
            selected = null; 
            
            sendData({ type: 'ACTION', r2:r, c2:c, flip:true, colorSet:cs }); 
            updateUI(); draw(); checkWin();
            return;
        }

        // 吃子/移動動作
        if(selected) {
            if(canMove(selected.r, selected.c, r, c)) {
                if (board[r][c]) capturedPieces.push(board[r][c]);
                board[r][c] = board[selected.r][selected.c];
                board[selected.r][selected.c] = null;
                
                // 本地直接強制換手，清除殘影
                currentTurnRole = (currentTurnRole === 'HOST') ? 'GUEST' : 'HOST';
                const act = { type: 'ACTION', r1:selected.r, c1:selected.c, r2:r, c2:c, flip:false };
                selected = null; 
                
                sendData(act); 
                updateUI(); draw(); updateGraveyard(); checkWin();
            } else {
                // 如果點錯位置，只能重新選擇自己的棋子
                selected = (clicked && clicked.revealed && clicked.color === myColor) ? {r,c} : null; 
                draw();
            }
        } else if(clicked && clicked.revealed && clicked.color === myColor) {
            selected = {r,c}; 
            draw();
        }
    });

    // 完整的暗棋規則邏輯
    function canMove(r1,c1,r2,c2) {
        const p1 = board[r1][c1], p2 = board[r2][c2], dist = Math.abs(r1-r2)+Math.abs(c1-c2);
        if(!p1) return false;
        
        // 炮/包的特殊規則 (隔山打牛)
        if(p1.name==='炮'||p1.name==='包') {
            if(p2) { // 如果目標有棋子(吃子)
                if(r1!==r2 && c1!==c2) return false; // 必須直走或橫走
                let cnt = 0; // 計算中間隔了幾個棋子
                if(r1===r2) for(let i=Math.min(c1,c2)+1; i<Math.max(c1,c2); i++) if(board[r1][i]) cnt++;
                else for(let i=Math.min(r1,r2)+1; i<Math.max(r1,r2); i++) if(board[i][c1]) cnt++;
                
                // 必須剛好隔1個棋子 + 顏色不同 + 目標必須是已翻開的
                return cnt===1 && p1.color!==p2.color && p2.revealed;
            }
            // 如果 p2 是空的(單純移動一格)，會自動往下跑到 if(dist!==1)
        }
        
        // 一般棋子的規則
        if(dist!==1) return false; // 只能走一格
        if(!p2) return true; // 走到空格永遠合法
        if(p1.color===p2.color || !p2.revealed) return false; // 不能吃自己人，不能吃蓋著的牌
        
        // 大小階級判斷
        if(p1.level === 1 && p2.level === 7) return true; // 兵卒吃將帥
        if(p1.level === 7 && p2.level === 1) return false; // 將帥不能吃兵卒
        return p1.level >= p2.level; // 同階或大吃小
    }

    function updateUI() {
        if(gameEnded) return;
        const isMyTurn = (myRole === currentTurnRole);
        statusText.innerText = isMyTurn ? "⭐ 你的回合" : "⏳ 等待對手...";
        statusText.style.color = isMyTurn ? "#2ecc71" : "#f1c40f"; // 綠色表示可行動，黃色表示等待
        turnDisplay.innerText = "身分：" + (myColor === 0 ? "尚未決定" : (myColor === 1 ? "紅方" : "黑方"));
    }

    function draw() {
        if(!board.length) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 2;
        for(let r=0; r<=ROWS; r++) { ctx.beginPath(); ctx.moveTo(PADDING, PADDING+r*cellSize); ctx.lineTo(canvas.width-PADDING, PADDING+r*cellSize); ctx.stroke(); }
        for(let c=0; c<=COLS; c++) { ctx.beginPath(); ctx.moveTo(PADDING+c*cellSize, PADDING); ctx.lineTo(PADDING+c*cellSize, canvas.height-PADDING); ctx.stroke(); }
        
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                const p = board[r][c]; if(!p) continue;
                const x = PADDING+c*cellSize+cellSize/2, y = PADDING+r*cellSize+cellSize/2;
                
                // 畫殘影/選取框
                if(selected && selected.r === r && selected.c === c) { 
                    ctx.fillStyle="rgba(255,255,255,0.4)"; 
                    ctx.fillRect(PADDING+c*cellSize, PADDING+r*cellSize, cellSize, cellSize); 
                }
                
                ctx.beginPath(); ctx.arc(x,y,cellSize*0.42,0,Math.PI*2);
                ctx.fillStyle = p.revealed ? "#fdf5e6" : "#a0522d";
                ctx.fill(); ctx.stroke();
                
                if(p.revealed) {
                    ctx.fillStyle = p.color===1 ? "#b22222" : "#2f4f4f";
                    ctx.font = `bold ${cellSize*0.5}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle
