<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Slither - 慢速優雅版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: rgba(0, 255, 65, 0.7); 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">
        <h3 id="scoreDisplay">長度: 15.0</h3>
        <p style="font-size: 0.7em;">慢速模式 | 按住左鍵噴射加速</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- 核心參數修改：更慢的速度 ---
    let snake = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        angle: 0,
        targetAngle: 0,
        baseSpeed: 1.5,   // 從 3 降到 1.5 (變得很慢)
        boostSpeed: 4,    // 加速也降到 4 (原本是 6)
        size: 6,         
        color: '#22ff00',
        boostColor: '#00ffff',
        history: [],      
        bodyLength: 15,  
        isBoosting: false
    };

    // 預填路徑
    for(let i=0; i<800; i++) {
        snake.history.push({x: snake.x, y: snake.y});
    }

    let foods = [];
    for(let i=0; i<80; i++) { createFood(); }

    function createFood() {
        foods.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            color: `hsl(${Math.random() * 360}, 100%, 70%)`
        });
    }

    let mouse = { x: snake.x, y: snake.y };
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('mousedown', (e) => { if(e.button === 0) snake.isBoosting = true; });
    window.addEventListener('mouseup', (e) => { if(e.button === 0) snake.isBoosting = false; });

    function gameLoop() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 畫格線
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // 加速邏輯
        let currentSpeed = (snake.isBoosting && snake.bodyLength > 5) ? snake.boostSpeed : snake.baseSpeed;
        let currentColor = (snake.isBoosting && snake.bodyLength > 5) ? snake.boostColor : snake.color;
        
        if (snake.isBoosting && snake.bodyLength > 5) {
            snake.bodyLength -= 0.02; // 加速消耗也稍微調慢一點
            scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
        }

        // 計算轉向
        let dx = mouse.x - snake.x;
        let dy = mouse.y - snake.y;
        snake.targetAngle = Math.atan2(dy, dx);

        let diff = snake.targetAngle - snake.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        
        // --- 核心修改：轉向靈敏度也調低 ---
        // 從 0.15 降到 0.08，讓轉彎的弧度變大，看起來更優雅
        snake.angle += diff * 0.08; 

        // 更新位置
        snake.x += Math.cos(snake.angle) * currentSpeed;
        snake.y += Math.sin(snake.angle) * currentSpeed;

        // 紀錄路徑
        snake.history.unshift({x: snake.x, y: snake.y});
        if (snake.history.length > 3000) snake.history.pop();

        // 畫食物
        foods.forEach((f, index) => {
            ctx.beginPath();
            ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.fill();

            let dist = Math.hypot(snake.x - f.x, snake.y - f.y);
            if (dist < snake.size + f.size) {
                snake.bodyLength += 0.3; // 緩慢成長
                foods.splice(index, 1);
                createFood();
                scoreDisplay.innerText = `長度: ${snake.bodyLength.toFixed(1)}`;
            }
        });

        // 畫身體
        for (let i = Math.floor(snake.bodyLength); i > 0; i--) {
            // 因為速度變慢，歷史路徑的點會很密集，我們把間隔拉大
            // 從 i * 4 改成 i * 8，保持節點之間的視覺距離
            let index = i * 8; 
            if (snake.history[index]) {
                let pos = snake.history[index];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, snake.size * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = (snake.isBoosting && snake.bodyLength > 5) ? 
                    `rgba(0, 255, 255, ${0.6 - i/snake.bodyLength})` : 
                    `rgba(34, 255, 0, ${0.6 - i/snake.bodyLength})`;
                ctx.fill();
            }
        }

        // 畫蛇頭
        ctx.save();
        ctx.translate(snake.x, snake.y);
        ctx.rotate(snake.angle);
        ctx.beginPath();
        ctx.arc(0, 0, snake.size, 0, Math.PI * 2);
        ctx.fillStyle = currentColor;
        ctx.fill();
        // 眼睛
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI * 2); ctx.arc(3, 2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
